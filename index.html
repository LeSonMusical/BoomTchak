<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PoumTchak</title>
<style>
/* ─── RESET ─── */
*{box-sizing:border-box;margin:0;padding:0}
*{user-select:none;-webkit-user-select:none}
.encyclo-chapo,.encyclo-bval{user-select:text;-webkit-user-select:text}
input,textarea{user-select:text;-webkit-user-select:text}

/* ─── LAYOUT GLOBAL ─── */
body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding-top:56px;padding-bottom:68px;overflow-x:hidden;width:100%}
.frame{background:#fff;width:100%;max-width:900px;min-width:0;margin:0 auto;padding:.5rem .85rem}

/* ─── TOP BAR ─── */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:80;background:#fff;border-bottom:1px solid #d0cec7;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.top-bar-left{display:flex;align-items:center;gap:4px;flex-shrink:0}
.top-bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.app-name{font-size:14px;font-weight:700;letter-spacing:.06em;color:#1a1a18}
.app-version{font-size:9px;color:#aaa;font-weight:400;margin-left:3px}
.btn-sx-tx{font-size:9px;padding:2px 6px;background:#ffeedd;border:1px solid #D85A30;border-radius:3px;color:#993C1D;font-weight:600;cursor:pointer}
.btn-top{padding:3px 9px;cursor:pointer;font-size:11px;font-weight:600;background:#fff;border:1px solid #c0bdb7;border-radius:5px;color:#555;letter-spacing:.03em}
.btn-top:hover{background:#e8e5e0}
.btn-top.active{background:#d0cec7;border-color:#888;color:#1a1a18}
.btn-view{padding:3px 8px;font-size:13px;border:2px solid #d0cec7;border-radius:5px;cursor:pointer;background:#fff;color:#666}
.btn-view:hover{background:#e8e5e0}
.btn-about{padding:1px 7px;font-size:11px;font-weight:700;background:#fff;border:1px solid #c0bdb7;border-radius:50%;color:#888;cursor:pointer;line-height:1.5}
.btn-about:hover{background:#e8e5e0}

/* ─── PANEL TEMPO ─── */
.panel2{background:#e8e5e0;border-bottom:1px solid #c8c5c0;overflow:hidden;transition:max-height .22s ease,padding .22s ease;max-height:0;padding:0 .85rem}
.panel2.open{max-height:130px;padding:.5rem .85rem}
.t-slider{width:100%;accent-color:#888}
.t-spm-display{font-size:11px;color:#999;cursor:pointer;text-align:right;min-width:52px}
.t-spm-display:hover{color:#555}
.t-equiv{font-size:11px;font-weight:500;color:#1a1a18;white-space:nowrap}
.btn-sm-tempo{padding:3px 8px;cursor:pointer;font-size:11px;background:#fff;border:1px solid #b0aea7;border-radius:5px;color:#666}
.btn-sm-tempo:hover{background:#f0ede8}
.btn-sm-tempo.active{background:#ddeeff;border-color:#5599cc;color:#1155aa}

/* ─── BARRES DE SECTION ─── */
.section-bar{display:flex;align-items:center;gap:5px;padding:.3rem .5rem;border-radius:4px;flex-wrap:nowrap;overflow:hidden;margin-bottom:4px}
.section-bar select{font-size:10px;flex:1;min-width:0;padding:1px 3px;border-radius:4px;background:#fff;color:#1a1a18;cursor:pointer}
.section-bar-lbl{font-size:10px;font-weight:600;flex-shrink:0;letter-spacing:.03em}
.btn-sec-ico{cursor:pointer;font-size:13px;background:none;border:none;padding:1px 3px;line-height:1;opacity:.6;flex-shrink:0}
.btn-sec-ico:hover{opacity:1}
.btn-info-ico{padding:1px 5px;cursor:pointer;font-size:10px;font-weight:700;background:transparent;border:1px solid #c0bdb7;border-radius:4px;color:#666;flex-shrink:0;line-height:1.4}
.btn-info-ico:hover{background:#e8e5e0}
.btn-info-ico.active{background:#d0cec7;border-color:#888;color:#1a1a18}
.btn-volet{padding:2px 5px;cursor:pointer;font-size:10px;font-weight:500;background:transparent;border:none;border-radius:4px;color:#bbb;flex-shrink:0;white-space:nowrap;margin-left:auto;transition:color .12s}
.btn-volet:hover,.btn-volet.open{color:#555}
/* barre groove : dorée */
.groove-bar{background:#faf3e0;border-bottom:1px solid #e0ddd8;border-left:3px solid #C8961A}
.groove-bar .section-bar-lbl{color:#8B6914}
.groove-bar select{border:1px solid #d4b86a}
.btn-volet-groove{color:#C8961A !important}
.btn-volet-groove:hover,.btn-volet-groove.open{color:#8B6914 !important}
/* barre band : bleue */
.band-bar{background:#eef4f8;border-bottom:1px solid #c8dff0;border-left:3px solid #4A7FA5;display:none}
.band-bar.visible{display:flex}
.band-bar .section-bar-lbl{color:#2d5f80}
.band-bar select{border:1px solid #8ab4d0}
.band-content{overflow:hidden;transition:max-height .22s ease;max-height:0}
.band-content.open{max-height:700px}
/* barre encyclo : grise */
.encyclo-bar{background:#f5f4f0;border-left:3px solid #888;cursor:pointer}
.encyclo-bar .section-bar-lbl{color:#444}
.encyclo-content{overflow:hidden;transition:max-height .35s ease;max-height:0}
.encyclo-content.open{max-height:3000px}

/* ─── LAYERS ─── */
#layers-wrap{display:flex;align-items:flex-start;gap:0}
/* Indent visuel : les layers appartiennent au groove */
#layers{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;margin-left:10px;border-left:2px solid #e0d090;padding-left:6px}
.layer{display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border:1px solid var(--cs);background:#fff}
/* Ligne 1 : contrôles */
.layer-row1{display:flex;align-items:center;gap:3px;padding:4px 6px;background:var(--cl);border-bottom:1px solid var(--cs);min-height:34px}
.layer-lbl{font-size:10px;font-weight:700;color:var(--cb);flex-shrink:0;white-space:nowrap;letter-spacing:.02em}
.layer-select{font-size:9px;flex:1;min-width:0;border:1px solid var(--cs);border-radius:3px;background:#fff;color:var(--cb);padding:1px 2px;cursor:pointer}
.btn-mute-sq{width:24px;height:24px;flex-shrink:0;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--cc);padding:0;line-height:1;color:#fff;transition:background .15s}
.btn-mute-sq:hover{filter:brightness(.9)}
.btn-mute-sq.muted{background:#c8c5c0}
.btn-layer-toggle{margin-left:auto;font-size:10px;font-weight:600;background:transparent;border:none;border-radius:4px;color:var(--cb);cursor:pointer;flex-shrink:0;white-space:nowrap;padding:2px 4px;opacity:.6;line-height:1.2}
.btn-layer-toggle:hover{opacity:1}
/* Ligne 2 : steps + mod */
.layer-row2{display:flex;align-items:flex-start;gap:4px;padding:5px 6px 5px;min-width:0;overflow:hidden}
.layer-row2.collapsed{display:none}
.layer-steps{flex:1;display:flex;flex-wrap:wrap;gap:2px;min-width:0}
.btn-layer-mod{margin-left:auto;cursor:pointer;font-size:14px;font-weight:700;background:none;border:none;padding:2px 3px;line-height:1;opacity:.55;flex-shrink:0;color:var(--cb);display:none;align-self:flex-start}
body.mode-tx .btn-layer-mod{display:inline-block}
body.mode-tx .btn-layer-mod:hover{opacity:1}
.step{width:22px;height:22px;border-radius:3px;border:1.5px solid var(--cs);background:#fff;cursor:pointer;flex-shrink:0;transition:background .08s}
.step.on{background:var(--cc);border-color:var(--cb)}
.step.cur{box-shadow:0 0 0 2px var(--cb);border-color:var(--cb)}
.step.on.cur{background:var(--cb)}
.layer.muted-layer .step.on{background:var(--cs)}
.hdivider{height:1px;background:#e0ddd8;margin:.4rem 0}
/* Texte éditable en TX */
body.mode-tx [contenteditable="true"]{border-radius:3px;outline:none;transition:background .1s}
body.mode-tx [contenteditable="true"]:hover{background:rgba(216,90,48,.07);cursor:text}
body.mode-tx [contenteditable="true"]:focus{background:rgba(216,90,48,.11);box-shadow:0 0 0 2px rgba(216,90,48,.3)}

/* ─── DIRTY STATE ─── */
.btn-sec-save.dirty{color:#D85A30;opacity:1}
.btn-sec-save.dirty::after{content:'!';font-size:8px;vertical-align:super;margin-left:1px}

/* ─── SAVE SHEET ─── */
.save-sheet{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.4);display:flex;align-items:flex-end}
.save-sheet.hidden{display:none}
.save-sheet-box{width:100%;background:#fff;border-radius:16px 16px 0 0;padding:18px 16px 28px;max-height:85vh;overflow-y:auto}
.save-sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.save-sheet-title{font-size:13px;font-weight:700;color:#1a1a18}
.save-sheet-x{width:28px;height:28px;border-radius:50%;border:none;background:#f0ede8;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#666}
.save-sheet-x:hover{background:#e0ddd8}
.save-sheet-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.save-sheet-opt{padding:11px 14px;border-radius:8px;border:1.5px solid #d0cec7;background:#fff;font-size:12px;font-weight:600;cursor:pointer;text-align:left;color:#1a1a18;line-height:1.4}
.save-sheet-opt:hover{background:#f5f4f0}
.save-sheet-opt.primary{border-color:#D85A30;color:#D85A30}
.save-sheet-opt.primary:hover{background:#fff5f2}
.save-sheet-opt:disabled{opacity:.35;cursor:default}
.save-sheet-opt:disabled:hover{background:#fff}
.save-sheet-new{display:none;flex-direction:column;gap:6px;padding:10px 12px;border:1.5px solid #4A7FA5;border-radius:8px;background:#f4f8fb}
.save-sheet-new.open{display:flex}
.save-sheet-new-lbl{font-size:10px;font-weight:600;color:#2d5f80}
.save-sheet-input{font-size:12px;padding:6px 8px;border:1px solid #b0aea7;border-radius:5px;width:100%}
.save-sheet-input:focus{outline:none;border-color:#4A7FA5;box-shadow:0 0 0 2px rgba(74,127,165,.2)}
.save-sheet-grp-sel{font-size:11px;padding:4px 6px;border:1px solid #b0aea7;border-radius:5px;background:#fff;color:#1a1a18}
.save-sheet-confirm{padding:8px 14px;background:#4A7FA5;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;align-self:flex-end}
.save-sheet-confirm:hover{background:#2d5f80}
.save-sheet-cancel{width:100%;padding:10px;border:none;background:transparent;font-size:12px;color:#999;cursor:pointer}
.save-sheet-cancel:hover{color:#555}

/* ─── COULEURS PAR COUCHE ─── */
.c-low  {--cc:#378ADD;--cb:#185FA5;--cl:#378ADD0D;--cs:#378ADD55}
.c-high {--cc:#D85A30;--cb:#993C1D;--cl:#D85A300D;--cs:#D85A3055}
.c-noise{--cc:#1D9E75;--cb:#0F6E56;--cl:#1D9E750D;--cs:#1D9E7555}
.c-thumb-l{--cc:#7B5EA7;--cb:#5A3F85;--cl:#7B5EA70D;--cs:#7B5EA755}
.c-thumb-r{--cc:#C8961A;--cb:#8B6914;--cl:#C8961A0D;--cs:#C8961A55}

/* ─── SONS (BAND) ─── */
.sound-layer{border-radius:5px;overflow:hidden;border:1px solid var(--cs);border-left:3px solid var(--cc);background:var(--cl);margin-bottom:3px}
.sound-header{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer}
.sound-header:hover{filter:brightness(.97)}
.sound-lbl{font-size:10px;font-weight:600;color:var(--cb);white-space:nowrap;flex-shrink:0}
.sound-arrow{font-size:13px;color:var(--cb);opacity:.7;transition:transform .15s;flex-shrink:0}
.sound-arrow.open{transform:rotate(90deg)}
.vol-h-wrap{display:flex;align-items:center;gap:3px;width:56px;flex-shrink:0}
.vol-h-lbl{font-size:8px;color:var(--cb);opacity:.6;flex-shrink:0}
.vol-h-track{flex:1;height:4px;background:var(--cs);border-radius:2px;position:relative;cursor:pointer;min-width:30px}
.vol-h-fill{position:absolute;left:0;top:0;height:100%;background:var(--cc);border-radius:2px;pointer-events:none}
.vol-h-thumb{position:absolute;top:50%;width:12px;height:12px;background:var(--cc);border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none}
.sound-ctrls{border-top:1px solid var(--cs)}
.sound-ctrls.hidden{display:none}
.sound-ctrls-inner{display:flex;flex-direction:column;gap:2px;padding:4px 8px 5px}
.sl-row{display:flex;align-items:center;gap:4px}
.sl-row label{font-size:9px;color:#888;width:36px;flex-shrink:0}
.sl-row input[type=range]{flex:1;padding:0;accent-color:var(--cc)}
.sound-sep{height:1px;background:#d0cec7;margin:4px 0}

/* ─── ENCYCLOPÉDIE ─── */
.encyclo-wrap{padding:6px 0 4px}
.encyclo-chapo{font-size:12px;line-height:1.65;color:#2a2a28;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e8e6e2}
.encyclo-bullets{list-style:none;display:flex;flex-direction:column;gap:8px}
.encyclo-bullets li{display:flex;flex-direction:column;gap:2px;font-size:11px;line-height:1.6}
.encyclo-bkey{font-weight:500;color:#1a1a18}
.encyclo-bval{color:#555;padding-left:10px;white-space:pre-line}
.encyclo-vide{font-size:11px;color:#aaa;font-style:italic}

/* ─── BOTTOM BAR ─── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:80;background:#fff;border-top:2px solid #d0cec7;display:flex;align-items:stretch;height:60px;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.bottom-left{flex:1;display:flex;align-items:center;justify-content:center}
.bottom-center{display:flex;align-items:center;justify-content:center;padding:0 16px}
.bottom-right{flex:1;display:flex;align-items:center;justify-content:center}
.btn-play-main{height:44px;padding:0 28px;font-size:22px;font-weight:700;border:2px solid #F5C518;border-radius:10px;background:#fff;color:#1a1a18;cursor:pointer;transition:background .1s}
.btn-play-main:hover{background:#fffbe8}
.btn-play-main.active{background:#F5C518;border-color:#d4a800}
.btn-jouer-wrap{height:52px;padding:0 14px;cursor:pointer;font-size:11px;font-weight:700;background:#fff;border:2px solid #1D9E75;border-radius:10px;color:#1D9E75;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-jouer-wrap:hover{background:#ddfff4}
.btn-jouer-wrap.active{background:#1D9E75;color:#fff}
.hand{font-size:22px;line-height:1}

/* ─── VOLET JOUER ─── */
.play-drawer{position:fixed;bottom:60px;left:0;right:0;z-index:90;background:#1a1a18;border-radius:16px 16px 0 0;padding:14px 12px 18px;display:none}
.play-drawer.open{display:block}
.play-drawer-close{position:absolute;top:8px;right:10px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:none;border:none;color:#888;cursor:pointer}
.play-drawer-close:hover{color:#fff;background:#333}
.play-btns{display:flex;gap:12px;align-items:center;justify-content:center;padding-top:4px}
.play-thumb{flex:1;max-width:46%;height:80px;border-radius:40px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.play-thumb:active{filter:brightness(1.3)}
.play-thumb.flash{animation:thumbflash .18s ease-out}
.play-thumb-l{background:#7B5EA7}
.play-thumb-r{background:#C8961A}
@keyframes thumbflash{0%{filter:brightness(1)}50%{filter:brightness(2.2) saturate(1.5)}100%{filter:brightness(1)}}

/* ─── MODE TX ─── */
body.mode-tx .btn-sx-tx{background:#D85A30;color:#fff;border-color:#993C1D}
/* Steps éditables en mode TX */
body.mode-tx .step{cursor:pointer}
body.mode-tx .step:not(.on):hover{background:var(--cl);border-color:var(--cc)}
body.mode-tx .step.on:hover{filter:brightness(.85)}
body:not(.mode-tx) .step{cursor:default}

/* ─── BOUTONS DE SECTION (💾 et ≡) ─── */
.btn-sec-save{cursor:pointer;font-size:12px;background:none;border:none;padding:1px 4px;line-height:1.2;opacity:.6;flex-shrink:0;color:inherit}
.btn-sec-save:hover{opacity:1}
.btn-sec-menu{cursor:pointer;font-size:14px;font-weight:700;background:none;border:none;padding:1px 4px;line-height:1.2;opacity:.65;flex-shrink:0;color:inherit;display:none}
body.mode-tx .btn-sec-menu{display:inline-block}
body.mode-tx .btn-sec-menu:hover{opacity:1}
/* Variante compacte pour les layers */
.layer-actions{display:flex;gap:0;margin-top:2px}
.layer-actions .btn-sec-save{font-size:11px;padding:1px 3px;opacity:.5}
.layer-actions .btn-sec-menu{font-size:12px;padding:1px 3px;opacity:.5}

/* ─── DIALOG PARTAGE PATTERN ─── */
.ptk-dialog{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}
.ptk-dialog.hidden{display:none}
.ptk-dialog-box{background:#fff;border-radius:12px;padding:18px 20px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.22)}
.ptk-dlg-title{font-size:13px;font-weight:700;color:#1a1a18;margin-bottom:8px}
.ptk-dlg-msg{font-size:11px;color:#555;margin-bottom:14px;line-height:1.6}
.ptk-dlg-btns{display:flex;flex-direction:column;gap:6px}
.ptk-dlg-btn{padding:9px 12px;border-radius:6px;border:1px solid #d0cec7;font-size:11px;font-weight:600;cursor:pointer;text-align:left;background:#fff;color:#1a1a18}
.ptk-dlg-btn:hover{filter:brightness(.95)}
.ptk-dlg-btn-primary{background:#D85A30;color:#fff;border-color:#D85A30}
.ptk-dlg-btn-cancel{background:transparent;color:#999;border-color:transparent;text-align:center;font-weight:400}

/* ─── RESPONSIVE ─── */
@media(max-width:599px){
  .layer-menu{width:88px}
  .step{width:20px;height:20px}
}
@media(min-width:600px){
  #layers-wrap{flex-direction:row}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <button class="btn-sx-tx" id="btn-sx-tx">SX</button>
    <span class="app-name">PoumTchak</span>
    <span class="app-version">v2.0.4</span>
  </div>
  <div class="top-bar-right">
    <button class="btn-top" id="btn-tempo">Tempo</button>
    <button class="btn-top" id="btn-sons">Sons</button>
    <button class="btn-view" id="btn-view" title="Vue">⊞</button>
    <button class="btn-about" id="btn-about">?</button>
  </div>
</div>

<!-- ZONE CENTRALE -->
<div class="frame">
  <!-- Panel tempo (glisse sous la top bar) -->
  <div class="panel2" id="panel-tempo">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:10px;font-weight:700;color:#555;letter-spacing:.06em">TEMPO</div>
      <div style="display:flex;align-items:center;gap:6px;width:100%">
        <input type="range" class="t-slider" id="bpm" min="30" max="400" value="200" step="1" style="flex:1">
        <span class="t-spm-display" id="bpm-val">200 spm</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn-sm-tempo" id="btn-global-half">/2</button>
        <span class="t-equiv" id="bpm-equiv"></span>
        <button class="btn-sm-tempo" id="btn-global-double">×2</button>
      </div>
    </div>
  </div>
  <!-- Section Band (Sons) -->
  <div id="section-band"></div>
  <div class="band-content" id="band-content">
    <div style="padding:.4rem .6rem .5rem"><div id="sounds"></div></div>
  </div>
  <!-- Section Groove -->
  <div id="section-groove"></div>
  <!-- Layers (3 couches rythmiques) -->
  <div id="layers-wrap"><div id="layers"></div></div>
  <div class="hdivider"></div>
  <!-- Section Encyclopédie -->
  <div id="section-encyclo"></div>
</div>

<!-- Volet Jouer -->
<div class="play-drawer" id="play-drawer">
  <button class="play-drawer-close" id="play-drawer-close">✕</button>
  <div class="play-btns">
    <button class="play-thumb play-thumb-l" id="play-thumb-l">◉<br><span style="font-size:10px;font-weight:400;opacity:.7">main gauche</span></button>
    <button class="play-thumb play-thumb-r" id="play-thumb-r">◉<br><span style="font-size:10px;font-weight:400;opacity:.7">main droite</span></button>
  </div>
</div>

<!-- Save sheet (💾 pattern) -->
<div class="save-sheet hidden" id="save-sheet">
  <div class="save-sheet-box">
    <div class="save-sheet-head">
      <span class="save-sheet-title" id="ss-title">Sauvegarder le pattern</span>
      <button class="save-sheet-x" id="ss-close">✕</button>
    </div>
    <div class="save-sheet-opts">
      <button class="save-sheet-opt primary" id="ss-overwrite">① Écraser <span id="ss-overwrite-name"></span></button>
      <button class="save-sheet-opt" id="ss-new-toggle">② Sauvegarder comme nouveau ▶</button>

// Contenu encyclopédique — immutable, données éditoriales de référence
const ENCYCLO = {
  fl4:{
    chapo:"Le \"Four on the Floor\" est le rythme fondateur des musiques de danse électronique — une frappe sur chaque temps binaire (les temps 2 et 4 d'une mesure à 4/4, soit toutes les croches paires sur 8 pas). Sa régularité absolue ancre physiquement l'auditeur et synchronise les corps en masse. Il est indissociable de son complémentaire exact, l'Off Beat, qui frappe exactement là où lui se tait — ensemble ils forment le métronome binaire du dancefloor.",
    bullets:[["Origine","Disco américain, années 70 — DJ Frankie Knuckles, Larry Levan à New York et Chicago ; popularisé en Europe par la scène house puis techno des années 80-90."],["Écriture","X.X.X.X.\nFrappe sur chaque temps binaire (croches 1,3,5,7)\n4 frappes sur 8 pas"],["Utilisation","Techno, house, EDM, disco ; base universelle des musiques de dancefloor depuis 50 ans."],["Sensation","Ancrage total, prévisibilité rassurante, énergie par accumulation et non par tension."],["Relations","Complémentaire exact de l'Off Beat (2,4) : là où l'un frappe, l'autre se tait — les superposer produit le Pulse (4:4) continu."]]
  },
  offbeat:{
    chapo:"L'Off Beat est le complémentaire exact du Four on the Floor — il frappe précisément sur les contretemps, là où son partenaire se tait. Ensemble ils forment le métronome binaire fondamental du dancefloor disco et électronique. L'Off Beat seul crée cette sensation de suspension et de rebond caractéristique du groove de danse — le corps anticipe la frappe suivante en s'appuyant sur l'absence.",
    bullets:[["Origine","Disco américain, années 70 — même héritage que le Four on the Floor ; le skank reggae et le upstroke funk sont des ancêtres directs."],["Écriture",".X.X.X.X\nFrappe sur chaque contretemps (croches 2,4,6,8)\n4 frappes sur 8 pas — complémentaire exact du Four on the Floor"],["Logique","Four on the Floor + Off Beat = Pulse (4:4) — deux rythmes opposés dont l'union forme la pulsation continue."],["Sensation","Suspension, rebond, légèreté — le groove est porté par l'anticipation plutôt que par l'appui."],["Utilisation","Guitare rythmique funk et disco (le \"chicken scratch\") ; piano ou orgue en house ; hi-hat ouvert en techno ; clap ou snare en pop."]]
  },
  tres:{
    chapo:"Le Tresillo est probablement le pattern rythmique le plus répandu dans les musiques populaires mondiales — trois frappes sur 8 pas, distribution euclidienne maximale. On le retrouve dans quasiment toutes les musiques issues de la diaspora africaine aux Amériques et au-delà, souvent sans qu'il soit nommé. Sa simplicité apparente cache une tension rythmique réelle avec la pulsation binaire.",
    bullets:[["Origine","Terme cubain, mais le pattern est pan-africain et pan-américain ; présent dans les Caraïbes, le Brésil, la Nouvelle-Orléans."],["Écriture","X..X..X.\nIntervalles : 3-3-2\nE(3,8) — distribution euclidienne maximale sur 8 pas"],["Logique","Le 1er coup lance le rythme ; le 2e coup (\"bombo\", au pas 4) crée l'élan ; le 3e coup (\"ponche\", au pas 7) résout — c'est l'asymétrie finale (intervalle 2 au lieu de 3) qui génère la tension caractéristique."],["Utilisation","Blues, jazz, cumbia, son cubain ; la main gauche du piano de Hound Dog d'Elvis ; de nombreuses lignes de basse hip-hop."],["Relations","Sous-composant de Son 3:2 (les 3 premières frappes) ; présent dans Cinquillo, Habanera et Rumba par déformation ou extension."]]
  },
  cinq:{
    chapo:"Le Cinquillo est l'un des rythmes fondateurs de la musique afro-cubaine, né de l'extension et de la densification du Tresillo. Cinq frappes sur 8 pas, il remplit l'espace laissé libre par son ancêtre en intercalant deux frappes supplémentaires. Présent dans la contradanza du XIXe siècle, il a traversé le danzón, le mambo et le cha-cha-chá, devenant un composant-clé de la généalogie rythmique cubaine.",
    bullets:[["Origine","Cuba, XIXe siècle ; contradanza afro-cubaine, ancêtre direct du danzón et du mambo."],["Écriture","X.XX.XX.\nIntervalles : 2-1-2-1-2\n5 frappes sur 8 pas"],["Logique","C'est le Tresillo avec des coups ajoutés juste avant le bombo (pas 3) et le ponche (pas 6) — même squelette, densité presque doublée."],["Sensation","Plus nerveux et syncopé que le Tresillo, sentiment d'urgence et de rebond continu."],["Relations","Extension directe du Tresillo ; intermédiaire entre Tresillo (3 frappes) et Pulse (5 frappes continues sur 8)."]]
  },
  hab:{
    chapo:"La Habanera est un rythme né à La Havane au début du XIXe siècle, issu du contradanse européen métissé de rythmes africains. Elle a voyagé vers l'Espagne et l'Amérique latine avec une facilité remarquable, devenant l'un des premiers rythmes de la diaspora afro-cubaine à pénétrer la musique savante européenne.",
    bullets:[["Origine","La Havane, début XIXe ; importée en Espagne où elle influence le flamenco et la zarzuela ; Bizet l'utilise dans Carmen (1875)."],["Écriture","X..XX.X.\nIntervalles : 3-1-2-2\nTresillo + contretemps au pas 4"],["Sensation","Balancement asymétrique, légèreté malgré la syncope, caractère dansé et élégant."],["Utilisation","Tango argentin (qui en descend directement), bolero cubain, blues américain (Hey Bo Diddley) ; Carmen de Bizet (1875) popularise la Habanera en Europe savante."],["Anecdote","Bo Diddley a construit toute sa carrière sur ce pattern — appelé \"Bo Diddley beat\" en Amérique du Nord, sans que personne ne sache toujours qu'il vient de La Havane."]]
  },
  afoxe:{
    chapo:"L'Afoxê (ou Ijexá) est un rythme afro-brésilien de Salvador de Bahia, issu de la tradition yoruba-nagô du candomblé. Distinct de la Samba, il appartient à une famille rythmique plus proche des racines africaines — les mêmes qui ont engendré le Bembé à Cuba. Sa douceur hypnotique contraste avec la puissance explosive de la Samba.",
    bullets:[["Origine","Salvador de Bahia (Brésil) ; tradition yoruba-nagô du candomblé ; l'Afoxê Filhos de Gandhi (fondé en 1949) est le groupe le plus célèbre."],["Écriture","X..X.X..\nIntervalles : 3-2-3\n3 frappes sur 8 pas"],["Sensation","Douceur hypnotique, balancement lent et profond, sentiment de procession."],["Utilisation","Carnaval de Salvador, candomblé ; Gilberto Gil et Caetano Veloso l'ont popularisé internationalement dans les années 70-80."],["Relations","Même nombre de frappes que le Tresillo (3 sur 8) mais distribution différente (3-2-3 vs 3-3-2) — comparer les deux révèle comment un même nombre de frappes peut produire des caractères radicalement différents."]]
  },
  reggae:{
    chapo:"La Clave Reggae est le pattern fondateur de la rythmique jamaïcaine — deux frappes sur 8 pas, placées sur le contretemps du 3e temps et son \"et\". Sa caractéristique la plus frappante est l'absence totale de frappe sur les 4 premiers pas — ce silence initial est précisément ce qui crée la sensation de \"retard\" caractéristique du reggae, ce groove pesant et suspendu qui a influencé la quasi-totalité de la musique populaire mondiale.",
    bullets:[["Origine","Jamaïque — racine profonde dans le mento, musique folk jamaïcaine du XIXe siècle. Le skank et l'appui profond sur le 3e temps sans frapper le 1er sont les signatures sonores du reggae."],["Écriture","....X.X.\nIntervalles : 4-2-2\n2 frappes sur 8 pas — vide des 4 premiers pas constitutif"],["Logique","Grosse caisse sur le 3e temps (pas 5) et son contretemps (pas 7) — inversion complète du 4 on the floor."],["Sensation","Pesanteur, suspension, sentiment d'être \"derrière\" la pulsation — le groove le plus \"late\" du dictionnaire."],["Utilisation","Reggae roots, dub — Bob Marley, Lee Scratch Perry, King Tubby ; absorbé par le hip-hop, le trip-hop (Massive Attack, Portishead)."]]
  },
  son32:{
    chapo:"Le Son clave est le squelette rythmique de toute la musique afro-cubaine — né de la rencontre entre rythmes bantous et guitare espagnole dans l'Oriente cubain au XIXe siècle. Joué aux claves, deux bâtons de bois dur, il structure une famille musicale entière qui a rayonné mondialement. Son asymétrie fondamentale — 5 frappes inégalement réparties sur 16 pas — est précisément ce qui génère le groove syncopé caractéristique de la salsa.",
    bullets:[["Origine","Cuba, XIXe siècle, confluence yoruba/bantou et espagnole ; \"clave\" désigne à la fois l'instrument et la fonction structurelle (\"clé\" en espagnol)."],["Écriture","X..X..X...X.X...\nIntervalles : 3-3-4-2-4\nE(5,16)"],["Logique","La partie \"3\" (3 frappes) crée l'élan, la partie \"2\" (2 frappes) pose la résolution — l'asymétrie génère une tension permanente avec la pulsation."],["Sensation","Groove tiré en avant, sentiment d'incomplétude qui appelle la résolution, quasi-impossible de rester immobile."],["Anecdote","Dans la tradition cubaine, \"jouer contre la clave\" est la faute musicale suprême — un orchestre entier peut s'arrêter pour corriger."]]
  },
  son:{
    chapo:"Le Son 2:3 est la rotation du Son clave 3:2 — les mêmes 5 frappes décalées de 8 pas, ce qui inverse la logique élan/résolution. Ce n'est pas un rythme séparé mais une position différente du même pattern dans le cycle. Dans la pratique cubaine, les deux formes coexistent et dialoguent au sein d'un même morceau.",
    bullets:[["Écriture","..X.X...X..X..X.\nRotation du Son 3:2 (décalage 8 pas)\nRésolution en premier"],["Sensation","Plus posé que le 3:2, sentiment d'être \"derrière le temps\", légère flottaison."],["Usage","Certains instruments jouent en 2:3 pendant que d'autres tiennent le 3:2 — c'est cette superposition qui crée la richesse de la clave."],["Relations","Même pattern que Son 3:2, décalage de 8 pas — comprendre les deux ensemble est essentiel pour saisir la logique de la clave."]]
  },
  rum32:{
    chapo:"La Rumba clave est la cousine \"africaine\" du Son — plus proche des racines yoruba et bantou, moins métissée avec l'harmonie européenne. Elle diffère du Son par le déplacement d'une seule frappe (la 3e, avancée d'un pas), ce qui la fait sonner plus \"derrière le temps\" et plus funky. C'est le rythme de la rumba cubaine traditionnelle (yambu, guaguancó, columbia).",
    bullets:[["Origine","Cuba, communautés afro-cubaines du XIXe siècle ; la rumba est une forme populaire urbaine, pas un rythme de cérémonie."],["Écriture","X..X...X..X.X...\nIntervalles : 3-4-3-2-4\n3e frappe du Son 3:2 avancée d'un pas"],["Sensation","Plus \"derrière le temps\" que le Son, groove plus lourd, sentiment de retenue puis de lâcher."],["Relations","Variante du Son 3:2 par déplacement d'une seule frappe — même nombre de pas, même nombre de frappes, caractère sensiblement différent."]]
  },
  shiko:{
    chapo:"Le Shiko est un des rythmes fondamentaux de l'Afrique de l'Ouest, issu des peuples Ewe du Ghana et du Togo. Sa structure euclidienne — 5 frappes sur 16 pas — le place dans la même famille mathématique que le Son cubain, mais son caractère est radicalement différent : plus circulaire, moins tendu, plus hypnotique.",
    bullets:[["Origine","Ewe (Ghana/Togo) ; joué aux tambours dans les cérémonies communautaires."],["Écriture","X...X.X...X.X...\nIntervalles : 4-2-4-2-4\nE(5,16)"],["Logique","Alternance régulière 4-2 créant un balancement en deux temps inégaux — plus régulier que la clave, moins de tension élan/résolution."],["Sensation","Groove circulaire et hypnotique, sensation de rotation continue, moins \"tiré en avant\" que la clave."],["Relations","Même E(5,16) que Son 3:2, Bossa Nova et Gahu — trois façons différentes de placer 5 frappes sur 16 pas."]]
  },
  souk:{
    chapo:"Le Soukous est le rythme de la rumba congolaise, né à Kinshasa et Brazzaville dans les années 40-60 de la fusion entre la rumba cubaine importée par des disques, les rythmes bantous et la guitare électrique. Il est l'exemple parfait d'un aller-retour culturel : la rumba afro-cubaine revient en Afrique centrale et y génère une nouvelle forme musicale autonome.",
    bullets:[["Origine","Congo-Kinshasa et Congo-Brazzaville, années 50-60 ; Franco Luambo et l'OK Jazz, Tabu Ley Rochereau ; \"soukous\" vient du français \"secouer\"."],["Écriture","X..X..X...XX....\nVariante du Son 3:2\nCondensation des deux dernières frappes"],["Sensation","Groove léger et dansant, en avant du temps, accroche immédiate."],["Relations","Retour du rythme bantou en Afrique via Cuba — un des exemples les plus frappants de \"boucle culturelle\" dans l'histoire de la musique populaire."]]
  },
  bossa:{
    chapo:"La Bossa Nova est née à Rio de Janeiro en 1958 de la rencontre entre la samba brésilienne, le cool jazz américain et une nouvelle génération de musiciens cariocas. João Gilberto, en tapant ce pattern à la guitare tout en chantant et jouant les accords, a créé une texture entièrement nouvelle.",
    bullets:[["Origine","Rio de Janeiro, 1958 ; João Gilberto, Tom Jobim, Vinicius de Moraes — Chega de Saudade est le premier enregistrement."],["Écriture","X..X..X...X..X..\nIntervalles : 3-3-4-3-3\nE(5,16) — seule forme quasi-symétrique de la famille"],["Singularité","Seul rythme de la famille E(5,16) avec une quasi-symétrie. La sensation de flottaison vient du fait que tous les coups sauf le premier tombent en contretemps."],["Sensation","Légèreté, swing sans lourdeur, sentiment de suspension perpétuelle — le temps semble glisser plutôt que marcher."],["Relations","Même E(5,16) que Son 3:2, Shiko, Gahu — famille commune, caractère radicalement différent."]]
  },
  gahu:{
    chapo:"Le Gahu est un rythme de danse des Ewe du Ghana, apparu dans les années 40 et intégrant des influences extérieures. C'est l'un des rythmes africains les plus étudiés par les ethnomusicologues occidentaux, notamment par John Miller Chernoff dans African Rhythm and African Sensibility (1979).",
    bullets:[["Origine","Ewe du Ghana, milieu XXe siècle ; danse communautaire mixte."],["Écriture","X..X..X...X...X.\nIntervalles : 3-3-4-4-2\nE(5,16) — vide central caractéristique"],["Logique","Le grand intervalle central de 4+4 crée un \"vide\" inhabituel au milieu du pattern — c'est lui qui donne au Gahu son caractère suspendu."],["Sensation","Groove aéré, suspension au milieu du cycle, résolution rapide en fin de pattern."],["Relations","Troisième membre de la famille E(5,16) avec Son 3:2 et Shiko ; le vide central le distingue nettement des deux autres."]]
  },
  samba:{
    chapo:"La Samba est le rythme national brésilien, né à Rio de Janeiro au début du XXe siècle dans les communautés afro-brésiliennes. Sa structure sur 16 pas est plus dense que la Bossa Nova qui en dérive, avec 7 frappes créant un enchevêtrement caractéristique.",
    bullets:[["Origine","Rio de Janeiro, début XXe siècle ; communautés bahianaises installées dans les favelas ; institutionnalisé par le Carnaval."],["Écriture","X..X.X.X..X.X.X.\nIntervalles : 3-2-2-3-2-2-2\nE(7,16) — structure quasi-palindromique"],["Logique","Ce dialogue constant entre temps et contretemps crée une tension permanente qui appelle le corps à se mouvoir."],["Sensation","Énergie explosive et en avant du temps. Le groove est physiquement irrésistible."],["Relations","Même densité que Bembé (7 frappes) mais sur 16 pas — sensation très différente, moins oppressante."]]
  },
  fume:{
    chapo:"Le Fume-fume est un des rythmes fondateurs de la musique Ewe du Ghana, utilisé comme rythme-référence (\"bell pattern\") dans les cérémonies collectives. Sur base 12, il répartit 6 frappes en deux groupes asymétriques. C'est l'un des rythmes les plus analysés dans l'ethnomusicologie africaine.",
    bullets:[["Origine","Ewe (Ghana/Togo) ; joué à la cloche (gankogui) pour organiser les autres instruments de l'ensemble."],["Écriture","X.X.X..X.X..\nIntervalles : 2-2-3-2-3\nE(6,12)"],["Singularité","Peut être entendu en 3 (deux groupes de 6) ou en 2 (trois groupes de 4) — rythme \"ambigu\" jouant sur la frontière binaire/ternaire."],["Sensation","Oscillation, ambiguïté métrique, sensation de \"toupie\" pouvant basculer d'un côté ou de l'autre."],["Relations","Complémentaire exact de Bembé — les 6 pas de l'un sont les 6 silences de l'autre."]]
  },
  cascara:{
    chapo:"La Cáscara 3:2 (\"coquille\" en espagnol) est le pattern rythmique joué sur la coque métallique des timbales dans la salsa et la musique afro-cubaine. Dense, continue, asymétrique, elle est à la salsa ce que le charley est au jazz : l'horloge interne qui fait swinguer le tout.",
    bullets:[["Origine","Cuba, ensembles de salsa et de son des années 40-60 ; jouée sur les timbales par le timbalero."],["Écriture","X.XX.X.XX.X.XX.X\nIntervalles : 2-1-2-2-1-2-2-1-2-1\n10 frappes sur 16 pas"],["Logique","Elle contient toutes les frappes de la clave Son 3:2 plus des frappes supplémentaires — la clave enrichie d'un contrechant constant."],["Sensation","Dense et régulière en surface, elle crée un tapis rythmique continu sur lequel les autres instruments brodent."],["Utilisation","Timbales en salsa (sections verses, piano solos) ; Tito Puente, Willie Colón."]]
  },
  tumbao:{
    chapo:"Le Tumbao est le pattern de piano (ou tres) fondamental de la musique cubaine — ce que les Nord-Américains appellent montuno. Né dans le son montuno avec Arsenio Rodríguez, il est devenu le langage universel du piano en salsa, mambo et timba.",
    bullets:[["Origine","Cuba, son montuno, années 30-40 ; Arsenio Rodríguez introduit le piano dans le conjunto cubain."],["Écriture","X.XX.X.X.X.X.X.X\nPattern de piano (guajeo/montuno)\nPresque tous les coups sont en contretemps"],["Logique","Le pianiste joue des accords syncopés en arpèges, anticipant la pulsation. Le pattern s'organise strictement par rapport à la clave."],["Sensation","Tapis harmonique hypnotique, propulsion, sentiment que les accords \"flottent\" au-dessus du tempo."],["Relations","Distinct du tumbao de basse (pattern de contrebasse) avec lequel il s'interloque — les deux ensemble définissent le groove afro-cubain."]]
  },
  solea:{
    chapo:"La Soleá est la mère du flamenco — le palo (style) le plus fondamental, celui par lequel commence traditionnellement l'apprentissage de la guitare flamenca. Son compás (rythme) de 12 temps avec des accents sur les temps 3, 6, 8, 10 et 12 est une structure unique au monde, à la frontière du binaire et du ternaire.",
    bullets:[["Origine","Andalousie (Espagne), probablement Séville et Cadix, XVIIIe-XIXe siècle ; transmission orale dans les communautés gitanes."],["Écriture","..X..X.X.X.X\nAccents sur les temps 3-6-8-10-12\n5 frappes sur 12 pas — structure 3+3+2+2+2"],["Logique","Le compás commence sur un silence (temps 1 muet, caractéristique du flamenco) — arc dramatique tension/résolution en un seul cycle."],["Singularité","L'amalgame binaire/ternaire (6/8 + 3/4) crée une ambiguïté métrique qui est précisément la source de l'expressivité flamenco."],["Sensation","Gravité, lenteur intérieure, dignité — la Soleá est le temple du duende flamenco ; elle ne se précipite jamais."]]
  },
  bembe:{
    chapo:"Le Bembé est un rythme de cérémonie yoruba, joué dans la Santería cubaine pour l'invocation des Orishas. C'est le rythme euclidien le plus dense du dictionnaire sur base 12 — 7 frappes sur 12 pas, laissant à peine de l'espace. Cette densité quasi-continue produit une tension hypnotique sans repos qui explique son usage rituel.",
    bullets:[["Origine","Yoruba (Nigeria/Bénin), transplanté à Cuba avec la traite ; \"Bembé\" désigne aussi la cérémonie elle-même."],["Utilisation","Rituels de Santería (Cuba) ; jazz modal : Miles Davis Kind of Blue (1959), Coltrane Africa/Brass (1961) ; Steve Reich, Drumming (1971)."],["Écriture","X.X.XX.X.X.X\nIntervalles : 2-2-1-2-2-2\nE(7,12) — maximum euclidien sur base 12"],["Singularité","Un seul intervalle d'1 pas (entre frappes 5 et 6) — micro-accentuation caractéristique, comme un trébuchement contrôlé."],["Sensation","Urgence hypnotique, absence de respiration, état de transe — la densité est fonctionnelle, pas décorative."]]
  }
};

// ── Primitives de synthèse ────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));}

function sineDrop(a,t,f0,f1,dur,vol,punch){
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,8),t+dur);
  const pk=punch?vol*1.4:vol;
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(pk,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);
}

function noiseClick(a,t,dur,vol){
  const len=Math.ceil(a.sampleRate*Math.max(dur,0.005));
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,6);
  const src=a.createBufferSource(),g=a.createGain();
  src.buffer=buf;g.gain.value=vol;src.connect(g);g.connect(a.destination);src.start(t);
}

function noiseFiltered(a,t,dur,freq,vol,filterType){
  const len=Math.ceil(a.sampleRate*(dur+.01));
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=a.createBufferSource();src.buffer=buf;
  const filt=a.createBiquadFilter();filt.type=filterType||'highpass';
  filt.frequency.value=freq;filt.Q.value=0.8;
  const g=a.createGain();
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(filt);filt.connect(g);g.connect(a.destination);src.start(t);
}

function toneEnv(a,t,freq,dur,vol,type,atk){
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  const at=atk||0.003;
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol,t+at);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);
}

function snareSound(a,t,freq,dur,vol,noiseMix){
  toneEnv(a,t,freq,dur*0.4,vol*(1-noiseMix),'triangle',0.002);
  noiseFiltered(a,t,dur,freq*2,vol*noiseMix,'bandpass');
}

function claveSound(a,t,freq,dur,vol){
  const o=a.createOscillator(),g=a.createGain();
  o.type='square';o.frequency.value=freq;
  const filt=a.createBiquadFilter();filt.type='highpass';filt.frequency.value=freq*0.8;filt.Q.value=2;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(filt);filt.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.01);
}

function rimshotSound(a,t,freq,vol){
  noiseFiltered(a,t,0.04,freq*3,vol*0.7,'highpass');
  noiseClick(a,t,0.006,vol);
}

function bellSound(a,t,freq,dur,vol){
  const ratios=[1,2.756,5.404,8.933,13.35];
  const amps=[1,0.6,0.4,0.25,0.15];
  ratios.forEach((r,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=freq*r;
    const v=vol*amps[i],d=dur*Math.pow(0.55,i);
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(v,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.001,t+d);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d+.02);
  });
}

function triangleSound(a,t,freq,dur,vol){
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.value=freq;
  const o2=a.createOscillator(),g2=a.createGain();
  o2.type='sine';o2.frequency.value=freq*3.01;g2.gain.value=vol*0.015;
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol*0.7,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);o2.connect(g2);g.connect(a.destination);g2.connect(a.destination);
  o.start(t);o2.start(t);o.stop(t+dur+.02);o2.stop(t+dur+.02);
}

function strumSound(a,t,freq,dur,vol){
  [0,0.025,0.05].forEach((delay,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sawtooth';o.frequency.value=freq*[1,1.003,0.998][i];
    const filt=a.createBiquadFilter();filt.type='lowpass';
    filt.frequency.setValueAtTime(freq*6,t+delay);
    filt.frequency.exponentialRampToValueAtTime(freq*1.5,t+delay+dur);
    filt.Q.value=1.2;
    g.gain.setValueAtTime(0.001,t+delay);g.gain.linearRampToValueAtTime(vol*0.5,t+delay+0.005);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+dur);
    o.connect(filt);filt.connect(g);g.connect(a.destination);
    o.start(t+delay);o.stop(t+delay+dur+.02);
  });
}

function congaSound(a,t,f0,dur,vol,isBass){
  const f1=f0*(isBass?0.35:0.45);
  sineDrop(a,t,f0,f1,dur,vol,false);
  if(isBass){
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f0*0.5;
    g.gain.setValueAtTime(vol*0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.6);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur*0.6+.01);
  }
  noiseClick(a,t,0.008,vol*0.5);
}

function bongoSound(a,t,freq,dur,vol){
  sineDrop(a,t,freq*1.4,freq*0.7,dur,vol*0.8,false);
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq*2.8,t);
  o.frequency.exponentialRampToValueAtTime(freq*1.4,t+dur*0.5);
  g.gain.setValueAtTime(vol*0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.5);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur*0.5+.01);
  noiseClick(a,t,0.006,vol*0.4);
}

  kick:[40,160],gros_caisse:[36,146],tambour:[41,165],tom_bas:[55,220],
  snare:[138,554],caisse_claire:[131,523],clave:[880,3520],triangle_inst:[523,2093],

  conga_b:[55,220],bongo:[110,330],bell:[440,1760],triangle_p:[880,3520],
  strum:[110,440],rimshot:[200,800],clap:[300,1200],
};
function getPitchRange(id){return PITCH_RANGES[id]||[100,2000];}
function pitchToNorm(hz,id){const[lo,hi]=getPitchRange(id);return Math.max(0,Math.min(1,Math.log(Math.max(hz,lo)/lo)/Math.log(hi/lo)));}
function normToPitch(n,id){const[lo,hi]=getPitchRange(id);return lo*Math.pow(hi/lo,Math.max(0,Math.min(1,n)));}

let state=LAYERS.map(()=>({
  pattern:['.'],
  patternId:null,
  stepPos:0, nextStepTime:0, startTime:0,
  muted:false, halfOn:false, doubleOn:false,
  pendingHalf:false, pendingDouble:false, pendingClear:false,

function defaultSoundState(soundId,pitchDef){return{soundId,pitch:pitchDef,env:0.3,vol:0.5};}
let soundState=[
  defaultSoundState('kick',80),

let playing=false, ac=null, latencyMs=0;
let globalSpeedMult=1, pendingGlobalMult=1;
let schedTimerID=null, visualRafID=null;
const STEP_W=22;
const LOOKAHEAD=0.1;
const SCHED_MS=25;

function getAC(){
  if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}
  return ac;
}

function getBeatSec(li){
  const spm=parseInt(document.getElementById('bpm').value)*globalSpeedMult;
  const mult=state[li].doubleOn?2:state[li].halfOn?0.5:1;
  return(60/spm)/mult;
}

function scheduler(){
  if(!playing)return;
  const now=getAC().currentTime;
  LAYERS.forEach((layer,li)=>{
    while(state[li].nextStepTime<now+LOOKAHEAD){
      const si=state[li].stepPos;
      if(si===0){
        if(li===0&&pendingGlobalMult!==globalSpeedMult){
          const now2=getAC().currentTime,oldM=globalSpeedMult;
          globalSpeedMult=pendingGlobalMult;
          LAYERS.forEach((_,lj)=>{
            const rem=state[lj].nextStepTime-now2;
            if(rem>0)state[lj].nextStepTime=now2+rem*(oldM/globalSpeedMult);
          });
          updateGlobalSpeedBtns();
        }
        if(state[li].pendingClear){state[li].halfOn=false;state[li].doubleOn=false;state[li].pendingClear=false;}
        if(state[li].pendingHalf){state[li].halfOn=true;state[li].doubleOn=false;state[li].pendingHalf=false;}
        if(state[li].pendingDouble){state[li].doubleOn=true;state[li].halfOn=false;state[li].pendingDouble=false;}
      }
      // Phase 1 : seul 'X' (fort) déclenche le son — 'x' (faible) prévu pour une itération future
      if(state[li].pattern[si]==='X'&&!state[li].muted)scheduleNote(li,state[li].nextStepTime);
      state[li].nextStepTime+=getBeatSec(li);
      state[li].stepPos=(si+1)%state[li].pattern.length;
    }
  });
  schedTimerID=setTimeout(scheduler,SCHED_MS);
}

function visualLoop(){
  if(!playing)return;
  const now=getAC().currentTime;
  LAYERS.forEach((layer,li)=>{
    const beatSec=getBeatSec(li);
    const elapsed=now-state[li].startTime;
    const si=Math.floor(elapsed/beatSec)%state[li].pattern.length;
    const div=document.getElementById('steps-'+layer.id);if(!div)return;
    div.querySelectorAll('.step').forEach((s,i)=>s.classList.toggle('cur',i===si));
  });
  visualRafID=requestAnimationFrame(visualLoop);
}

function rotate(arr,n){const l=arr.length;if(!l)return arr;const k=((n%l)+l)%l;return[...arr.slice(k),...arr.slice(0,k)];}
function halfAt(len){if(len<=4)return null;return Math.ceil(len/2);}

// ── Son ───────────────────────────────────────────────────────────────────
function playSound(ss,atTime){
  const a=getAC();if(!a)return;
  const lat=latencyMs/1000;
  const t=Math.max(a.currentTime,atTime+lat);
  const def=SOUND_DEFS[ss.soundId];if(!def)return;
  def.play(a,t,{pitch:ss.pitch,env:ss.env,vol:ss.vol});
}
function scheduleNote(li,atTime){playSound(soundState[li],atTime);}
function playConga(isRight){
  const a=getAC();if(!a)return;
  playSound(soundStateThumb[isRight?1:0],a.currentTime);
}
function applyBandStyle(styleId){
  const s=BAND_STYLES.find(b=>b.id===styleId);if(!s)return;
  soundState[0]={soundId:s.low,  pitch:s.lowPitch,   env:.3,vol:soundState[0].vol};
  soundState[1]={soundId:s.high, pitch:s.highPitch,  env:.3,vol:soundState[1].vol};
  soundState[2]={soundId:s.noise,pitch:s.noisePitch, env:.3,vol:soundState[2].vol};
  soundStateThumb[0]={soundId:s.thumbL,pitch:s.thumbLPitch,env:.3,vol:soundStateThumb[0].vol};
  soundStateThumb[1]={soundId:s.thumbR,pitch:s.thumbRPitch,env:.3,vol:soundStateThumb[1].vol};
}

// ── Playback ──────────────────────────────────────────────────────────────
function startPlay(){
  playing=true;
  const a=getAC();
  const now=a.currentTime;
  LAYERS.forEach((_,li)=>{
    state[li].stepPos=0;
    state[li].nextStepTime=now;
    state[li].startTime=now;
  });
  scheduler();
  visualRafID=requestAnimationFrame(visualLoop);
}

function stopPlay(){
  playing=false;
  clearTimeout(schedTimerID);
  cancelAnimationFrame(visualRafID);
  LAYERS.forEach(l=>{
    const d=document.getElementById('steps-'+l.id);
    if(d)d.querySelectorAll('.step').forEach(s=>s.classList.remove('cur'));
  });
}

function togglePlay(){
  if(!playing){
    if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}
    ac.resume(); // iOS 18 : resume() synchrone dans le handler de clic
    document.getElementById('btn-play').textContent='■';
    document.getElementById('btn-play').classList.add('active');
    startPlay();
  } else {
    stopPlay();
    document.getElementById('btn-play').textContent='▶';
    document.getElementById('btn-play').classList.remove('active');
  }
}

function setLayerDirty(li, isDirty){
  dirtyLayers[li] = isDirty;
  // 💾 rouge si dirty
  const btn = document.getElementById('save-btn-layer-' + li);
  if(btn) btn.classList.toggle('dirty', isDirty);
  // Select : "[nom] ✱" si dirty
  const sel = document.getElementById('sel-' + LAYERS[li].id);
  if(sel && sel.options[sel.selectedIndex]){
    const opt = sel.options[sel.selectedIndex];
    if(isDirty && !opt.textContent.endsWith(' ✱')) opt.textContent += ' ✱';
    else if(!isDirty) opt.textContent = opt.textContent.replace(' ✱','');
  }
}

// ── Appliquer un groove depuis DATA → runtime audio ───────────────────────
function applyGroove(grooveId){
  const groove=getGroove(grooveId);if(!groove)return;
  currentGrooveId=grooveId;
  grooveDirty=false;
  updateGrooveSaveBtn();

  LAYERS.forEach((layer,li)=>{
    const gl=groove.layers[li];if(!gl)return;
    const pat=getPattern(gl.patternId);if(!pat)return;
    let seq=pat.sequence.split('');
    if(gl.shift)seq=rotate(seq,seq.length-gl.shift);
    state[li].pattern=seq;
    state[li].patternId=gl.patternId;
    state[li].stepPos=0;
    state[li].muted=gl.mute||false;
    state[li].halfOn=gl.halfOn||false;
    state[li].doubleOn=gl.doubleOn||false;
    state[li].pendingHalf=false;
    state[li].pendingDouble=false;
    state[li].pendingClear=false;
    state[li].wrapped=false;
  });

  // Appliquer le band
  applyBandStyle(groove.band_defaut);

  // Appliquer le multiplicateur de vitesse global
  const newMult=groove.vitesse_mult||1;
  globalSpeedMult=newMult;
  pendingGlobalMult=newMult;
  updateGlobalSpeedBtns();

  // Resync si en lecture
  if(playing){
    clearTimeout(schedTimerID);
    const now=getAC().currentTime;
    LAYERS.forEach((_,li)=>{
      state[li].stepPos=0;
      state[li].nextStepTime=now;
      state[li].startTime=now;
    });
    scheduler();
  }

  // Reconstruire le DOM des couches et sons
  buildLayers();
  buildSoundPanel();
  updateGrooveSelect();
  updateSpmDisplay();
}

// ── Couches rythmiques ────────────────────────────────────────────────────
const layerObservers=[];
function buildLayers(){
  layerObservers.forEach(o=>o.disconnect());layerObservers.length=0;
  const cont=document.getElementById('layers');if(!cont)return;
  cont.innerHTML='';

  LAYERS.forEach((layer,li)=>{
    const layerDiv=document.createElement('div');
    layerDiv.className='layer '+layer.cls+(state[li].muted?' muted-layer':'');

    // ── Ligne 1 : [●/○][label][select][≡ TX][💾][i][steps ▼/▶] ──────────
    const row1=document.createElement('div');row1.className='layer-row1';

    // ●/○ mute
    const btnMute=document.createElement('button');
    btnMute.className='btn-mute-sq'+(state[li].muted?' muted':'');
    btnMute.textContent=state[li].muted?'○':'●';
    btnMute.title=state[li].muted?'Activer':'Muet';
    btnMute.addEventListener('click',()=>{
      state[li].muted=!state[li].muted;
      btnMute.classList.toggle('muted',state[li].muted);
      btnMute.textContent=state[li].muted?'○':'●';
      layerDiv.classList.toggle('muted-layer',state[li].muted);

    });
    row1.appendChild(btnMute);

    // Label
    const lbl=document.createElement('span');lbl.className='layer-lbl';lbl.textContent=layer.label;
    row1.appendChild(lbl);

    // Select pattern
    const sel=document.createElement('select');
    sel.className='layer-select';sel.id='sel-'+layer.id;
    buildPatternSelect(sel);
    const curPat=findPatternBySeq(state[li].pattern);
    if(curPat)[...sel.options].forEach(o=>{if(o.value===curPat.id)o.selected=true;});

    // Bouton i (lien encyclo pattern courant)
    const btnI=document.createElement('button');btnI.className='btn-info-ico';btnI.textContent='i';
    function updateBtnI(){
      const pid=state[li].patternId;
      const p=pid?getPattern(pid):null;
      const has=!!(p&&p.encyclo_ref&&(packCours.encyclo||ENCYCLO)[p.encyclo_ref]);
      btnI.style.opacity=has?'1':'.3';btnI.style.cursor=has?'pointer':'default';
      btnI.onclick=has?()=>{showEncycloEntry(p.encyclo_ref);if(!encycloOuvert)toggleEncyclo(true);}:null;
    }
    updateBtnI();

    sel.addEventListener('change',()=>{
      const pat=getPattern(sel.value);if(!pat)return;
      state[li].pattern=pat.sequence.split('');
      state[li].patternId=pat.id;
      state[li].stepPos=0;state[li].wrapped=false;
      if(currentMode==='tx'){
        const groove=getGroove(currentGrooveId);
        if(groove&&groove.layers[li])groove.layers[li].patternId=pat.id;
        saveToStorage();
        grooveDirty=true; updateGrooveSaveBtn();
      }
      updateBtnI();
      setLayerDirty(li,false); // reset dirty sur changement de pattern
      buildStepsDOM(li,false);
      setTimeout(()=>checkWrap(li),0);
    });
    row1.appendChild(sel);

    // ≡ TX (gestion menu, TX only)

    saveBtn.className='btn-sec-save';saveBtn.id='save-btn-layer-'+li;
    saveBtn.textContent='💾';saveBtn.title='Sauvegarder ce pattern';
    saveBtn.addEventListener('click',e=>{e.stopPropagation();saveLayerPattern(li,saveBtn);});
    row1.appendChild(saveBtn);
    // i info
    row1.appendChild(btnI);
    // steps ▼/▶ toggle (justifié droite)
    const row2=document.createElement('div');row2.className='layer-row2';
    const btnToggle=document.createElement('button');btnToggle.className='btn-layer-toggle';
    let stepsOpen=true;btnToggle.textContent='steps ▼';

    row2.appendChild(stepsDiv);

    const btnMod=document.createElement('button');btnMod.className='btn-layer-toggle';
    btnMod.style.cssText='margin-left:auto;font-size:10px;opacity:.45';
    btnMod.textContent='mod ▶';btnMod.title='Transformations (prochaine version)';
    row2.appendChild(btnMod);

    layerDiv.appendChild(row2);

    buildStepsDOM(li,false);
    setTimeout(()=>checkWrap(li),0);
    attachLayerObserver(li);
  });
}

function findPatternBySeq(arr){
  const seq=arr.join('');
  return packCours.patterns.find(p=>p.sequence===seq);
}

function buildStepsDOM(li,wrap){
  const div=document.getElementById('steps-'+LAYERS[li].id);if(!div)return;
  div.innerHTML='';
  const pat=state[li].pattern;
  const ha=wrap?halfAt(pat.length):null;
  pat.forEach((p,si)=>{
    if(ha&&si===ha){
      const br=document.createElement('div');
      br.style.cssText='width:100%;height:0;flex-basis:100%;flex-shrink:0';
      div.appendChild(br);
    }
    const s=document.createElement('div');
    s.className='step'+(p==='X'?' on':p==='x'?' on':'');
    s.addEventListener('click',()=>onStepClick(li,si,s));
    div.appendChild(s);
  });
  state[li].wrapped=wrap;
}

function onStepClick(li,si,el){
  const srcPat=state[li].patternId?getPattern(state[li].patternId):null;
  const canEdit=currentMode==='tx'||(srcPat&&srcPat.source==='user');
  if(!canEdit)return;
  // Bascule en mémoire uniquement — persistance via 💾
  const newVal=state[li].pattern[si]==='X'?'.':'X';
  state[li].pattern[si]=newVal;
  el.className='step'+(newVal==='X'?' on':'');
  if(state[li].stepPos===si)el.classList.add('cur');
  // Dirty check
  const isDirty=srcPat?state[li].pattern.join('')!==srcPat.sequence:false;
  setLayerDirty(li,isDirty);
}

// Sauvegarde d'un pattern de layer
let _saveSheetLi = -1, _saveSheetBtn = null, _saveSheetType = 'layer';

function saveLayerPattern(li, btn){
  const srcPat = state[li].patternId ? getPattern(state[li].patternId) : null;
  // Sync patternId dans packCours
  const groove = getGroove(currentGrooveId);
  if(groove && groove.layers[li]) groove.layers[li].patternId = state[li].patternId;
  // Si pas dirty : juste sauvegarder
  if(!dirtyLayers[li]){ saveToStorage(); if(btn)flashSave(btn); return; }
  // Afficher la save sheet
  _saveSheetLi = li; _saveSheetBtn = btn;
  showSaveSheet(li, srcPat);
}

function showSaveSheet(li, srcPat){
  const nom = srcPat ? srcPat.nom : 'Pattern';
  const canOverwrite = currentMode==='tx' || (srcPat && srcPat.source==='user');

  document.getElementById('ss-title').textContent = '« ' + nom + ' » modifié';
  document.getElementById('ss-overwrite-name').textContent = nom;
  document.getElementById('ss-overwrite').disabled = !canOverwrite;

  // Pré-remplir le nom
  const nameInput = document.getElementById('ss-name');
  nameInput.value = nom + ' (copie)';

  // Construire le select de groupes
  const grpSel = document.getElementById('ss-group');
  grpSel.style.display = '';
  grpSel.innerHTML = '';
  const groups = currentMode==='tx'
    ? packCours.groupes_patterns
    : (packCours.groupes_patterns.filter(g=>g.id==='user').length
        ? packCours.groupes_patterns.filter(g=>g.id==='user')
        : [{id:'user', label:'Mes patterns', ids:[]}]);
  groups.forEach(g=>{
    const o=document.createElement('option');o.value=g.id;o.textContent=g.label;grpSel.appendChild(o);
  });
  // Sélectionner "Mes patterns" par défaut
  const userGrp = grpSel.querySelector('[value="user"]');
  if(userGrp) grpSel.value = 'user';

  // Réinitialiser le panneau ②
  document.getElementById('ss-new-panel').classList.remove('open');
  document.getElementById('ss-new-toggle').textContent = '② Sauvegarder comme nouveau ▶';
  document.getElementById('ss-overwrite').style.display = '';

  document.getElementById('save-sheet').classList.remove('hidden');
}

function closeSaveSheet(){
  document.getElementById('save-sheet').classList.add('hidden');
  _saveSheetLi = -1; _saveSheetBtn = null; _saveSheetType = 'layer';
}

function doOverwrite(){
  if(_saveSheetType === 'groove'){ doOverwriteGroove(); return; }
  const li = _saveSheetLi;
  const btn = _saveSheetBtn;
  const srcPat = state[li].patternId ? getPattern(state[li].patternId) : null;
  if(!srcPat){ closeSaveSheet(); return; }
  const currentSeq = state[li].pattern.join('');
  const usedIn = packCours.grooves.filter(g=>g.layers.some(l=>l.patternId===srcPat.id));

  const persist = (targetPat)=>{
    targetPat.sequence = currentSeq;
    saveToStorage();
    setLayerDirty(li, false);
    if(btn) flashSave(btn);
    closeSaveSheet();
  };

  closeSaveSheet();
  if(usedIn.length > 1){
    showPatternShareDialog(srcPat.nom, usedIn.map(g=>g.nom), choice=>{
      if(choice==='cancel') return;
      if(choice==='new'){
        // Rouvrir la save sheet en mode "nouveau seulement"
        _saveSheetLi = li; _saveSheetBtn = btn; _saveSheetType = 'layer';
        showSaveSheet(li, srcPat);
        document.getElementById('ss-overwrite').style.display = 'none';
        document.getElementById('ss-new-panel').classList.add('open');
        document.getElementById('ss-new-toggle').textContent = '② Sauvegarder comme nouveau ▼';
        return;
      }
      persist(srcPat);
    });
  } else {
    persist(srcPat);
  }
}

function doSaveNew(){
  if(_saveSheetType === 'groove'){ doSaveNewGroove(); return; }
  const li = _saveSheetLi;
  const srcPat = state[li].patternId ? getPattern(state[li].patternId) : null;
  const nom = document.getElementById('ss-name').value.trim() || (srcPat ? srcPat.nom+' (copie)' : 'Pattern');
  const grpId = document.getElementById('ss-group').value;

  const newPat = {
    id: 'user_' + Date.now(),
    nom,
    sequence: state[li].pattern.join(''),
    pas: state[li].pattern.length,
    unite_temps: srcPat ? srcPat.unite_temps : '1/8',
    pas_par_mesure: srcPat ? srcPat.pas_par_mesure : 8,
    source: 'user',
  };
  packCours.patterns.push(newPat);

  // Ajouter au groupe cible
  let grp = packCours.groupes_patterns.find(g=>g.id===grpId);
  if(!grp){ grp={id:'user',label:'Mes patterns',ids:[]}; packCours.groupes_patterns.push(grp); }
  grp.ids.push(newPat.id);

  // Rattacher la couche au nouveau pattern
  const groove = getGroove(currentGrooveId);
  if(groove && groove.layers[li]) groove.layers[li].patternId = newPat.id;
  state[li].patternId = newPat.id;

  // Rebuild le select
  const sel = document.getElementById('sel-' + LAYERS[li].id);
  if(sel){ buildPatternSelect(sel); sel.value = newPat.id; }

  saveToStorage();
  setLayerDirty(li, false);
  if(_saveSheetBtn) flashSave(_saveSheetBtn);
  closeSaveSheet();
}

// Sauvegarde du groove courant (sync état runtime → packCours)
function saveGroove(){
  const groove=getGroove(currentGrooveId);if(!groove)return;
  // Sync l'état complet de chaque couche
  LAYERS.forEach((_,li)=>{
    if(!groove.layers[li])return;
    if(state[li].patternId)groove.layers[li].patternId=state[li].patternId;
    groove.layers[li].mute=state[li].muted;
    groove.layers[li].halfOn=state[li].halfOn;
    groove.layers[li].doubleOn=state[li].doubleOn;
  });
  // Sync le band courant
  const bandSel=document.querySelector('#section-band select');
  if(bandSel)groove.band_defaut=bandSel.value;
  saveToStorage();
}

// ── Save sheet pour groove ────────────────────────────────────────────────
function saveGroovePattern(btn){
  if(!currentGrooveId){ if(btn)flashSave(btn); return; }
  const groove=getGroove(currentGrooveId);
  if(!groove){ if(btn)flashSave(btn); return; }
  if(!grooveDirty){ saveGroove(); if(btn)flashSave(btn); return; }
  _saveSheetBtn=btn; _saveSheetType='groove';
  showGrooveSaveSheet(groove);
}

function showGrooveSaveSheet(groove){
  const nom=groove.nom;
  const canOverwrite=currentMode==='tx'||(groove.source&&groove.source==='user');

  document.getElementById('ss-title').textContent='« '+nom+' » modifié';
  document.getElementById('ss-overwrite-name').textContent=nom;
  document.getElementById('ss-overwrite').disabled=!canOverwrite;
  document.getElementById('ss-overwrite').style.display='';

  const nameInput=document.getElementById('ss-name');
  nameInput.value=nom+' (copie)';

  // Pas de groupes pour les grooves : on cache le select de groupe
  const grpSel=document.getElementById('ss-group');
  grpSel.innerHTML='';
  grpSel.style.display='none';

  document.getElementById('ss-new-panel').classList.remove('open');
  document.getElementById('ss-new-toggle').textContent='② Sauvegarder comme nouveau ▶';

  document.getElementById('save-sheet').classList.remove('hidden');
}

function doOverwriteGroove(){
  const btn=_saveSheetBtn;
  closeSaveSheet();
  saveGroove();
  grooveDirty=false;
  updateGrooveSaveBtn();
  if(btn)flashSave(btn);
}

function doSaveNewGroove(){
  const btn=_saveSheetBtn;
  const groove=getGroove(currentGrooveId);
  if(!groove){ closeSaveSheet(); return; }
  const nom=document.getElementById('ss-name').value.trim()||groove.nom+' (copie)';

  const bandSel=document.querySelector('#section-band select');
  const newGroove=JSON.parse(JSON.stringify(groove));
  newGroove.id='user_groove_'+Date.now();
  newGroove.nom=nom;
  newGroove.source='user';
  if(bandSel)newGroove.band_defaut=bandSel.value;
  LAYERS.forEach((_,li)=>{
    if(newGroove.layers[li]&&state[li].patternId)newGroove.layers[li].patternId=state[li].patternId;
  });

  packCours.grooves.push(newGroove);

  // Ajouter au select groove et sélectionner
  const grooveSel=document.getElementById('groove-select');
  if(grooveSel){
    const o=document.createElement('option');o.value=newGroove.id;o.textContent=newGroove.nom;
    grooveSel.appendChild(o);
    grooveSel.value=newGroove.id;
  }
  currentGrooveId=newGroove.id;

  saveToStorage();
  grooveDirty=false;
  updateGrooveSaveBtn();
  if(btn)flashSave(btn);
  closeSaveSheet();
}

function checkWrap(li){
  const outer=document.getElementById('steps-'+LAYERS[li].id);if(!outer)return;
  const avail=outer.parentElement.clientWidth-8;
  const needed=state[li].pattern.length*STEP_W;
  const shouldWrap=needed>avail;
  if(shouldWrap!==state[li].wrapped)buildStepsDOM(li,shouldWrap);
}

function attachLayerObserver(li){
  const outer=document.getElementById('steps-'+LAYERS[li].id);if(!outer)return;
  const obs=new ResizeObserver(()=>checkWrap(li));
  obs.observe(outer.parentElement);layerObservers.push(obs);
}

// ── Panneau sons ──────────────────────────────────────────────────────────
function buildSoundPanel(){
  const cont=document.getElementById('sounds');if(!cont)return;
  cont.innerHTML='';
  const grooveKeys=['low','high','noise'];
  soundState.forEach((ss,li)=>{
    cont.appendChild(buildSoundRow(LAYERS[li].label,LAYERS[li].cls,LAYERS[li].id.replace('low','low').replace('high','high').replace('noise','noise'),ss,grooveKeys[li]));
  });

    cont.appendChild(buildSoundRow(thumbLabels[ti],thumbCls[ti],'thumb',ss,ti===0?'tl':'tr'));

function buildSoundRow(label,cls,cat,ss,openKey){
  // Format simplifié : [label][select][vol][≡ TX][💾] — sans collapse
  const row=document.createElement('div');row.className='sound-layer '+cls;
  const header=document.createElement('div');header.className='sound-header';

  // Label
  const lbl=document.createElement('div');lbl.className='sound-lbl';lbl.textContent=label;

  // Select instrument
  const instrSel=document.createElement('select');
  instrSel.style.cssText='font-size:9px;padding:1px 2px;border:1px solid var(--cs);border-radius:3px;background:#fff;color:var(--cb);flex:1;min-width:0;max-width:90px';
  Object.entries(SOUND_DEFS)
    .filter(([,d])=>cat==='thumb'?d.cat==='thumb':d.cat===cat)
    .forEach(([id,d])=>{
      const o=document.createElement('option');o.value=id;o.textContent=d.label;instrSel.appendChild(o);
    });
  instrSel.value=ss.soundId;
  instrSel.addEventListener('change',e=>{e.stopPropagation();ss.soundId=instrSel.value;});
  instrSel.addEventListener('pointerdown',e=>e.stopPropagation());

  // Slider volume (rétréci)
  const volWrap=document.createElement('div');volWrap.className='vol-h-wrap';
  const volLbl=document.createElement('span');volLbl.className='vol-h-lbl';volLbl.textContent='vol';
  const volTrack=document.createElement('div');volTrack.className='vol-h-track';
  const volFill=document.createElement('div');volFill.className='vol-h-fill';
  const volThumb=document.createElement('div');volThumb.className='vol-h-thumb';
  volTrack.appendChild(volFill);volTrack.appendChild(volThumb);
  volWrap.appendChild(volLbl);volWrap.appendChild(volTrack);
  function updateVol(v){const pct=Math.max(0,Math.min(1,v))*100;volFill.style.width=pct+'%';volThumb.style.left=pct+'%';}
  updateVol(ss.vol);
  setupHDrag(volTrack,v=>{ss.vol=v;updateVol(v);});
  volWrap.addEventListener('pointerdown',e=>e.stopPropagation());

  header.appendChild(lbl);
  header.appendChild(instrSel);
  header.appendChild(volWrap);
  header.appendChild(mkBtnMenu());
  header.appendChild(mkBtnSave(()=>saveToStorage()));
  row.appendChild(header);
  return row;
}

function mkSlider(lbl,cb,initVal){
  const row=document.createElement('div');row.className='sl-row';
  const lb=document.createElement('label');lb.textContent=lbl;
  const sl=document.createElement('input');sl.type='range';sl.min=0;sl.max=1000;sl.step=1;
  sl.value=Math.round((initVal||0)*1000);sl.style.flex='1';
  sl.addEventListener('input',()=>cb(parseInt(sl.value)/1000));
  row.appendChild(lb);row.appendChild(sl);return row;
}

function setupHDrag(track,onVal){
  function calc(e){const r=track.getBoundingClientRect();return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));}
  function move(e){onVal(calc(e));}
  track.addEventListener('pointerdown',e=>{
    e.preventDefault();track.setPointerCapture(e.pointerId);
    onVal(calc(e));
    track.addEventListener('pointermove',move);
    track.addEventListener('pointerup',()=>track.removeEventListener('pointermove',move),{once:true});
  });
}

function buildEncycloSection(){
  const cont=document.getElementById('section-encyclo');if(!cont)return;
  cont.innerHTML='';

  // Barre header (cliquable pour toggle)
  const bar=document.createElement('div');bar.className='section-bar encyclo-bar';

  const lbl=document.createElement('span');lbl.className='section-bar-lbl';lbl.textContent='À propos de';
  bar.appendChild(lbl);

  // Select entrée
  const sel=document.createElement('select');
  sel.id='encyclo-select';
  sel.style.cssText='font-size:10px;flex:1;min-width:0;max-width:180px;padding:1px 3px;border:1px solid #c0bdb7;border-radius:4px;background:#fff;color:#1a1a18';
  const optVide=document.createElement('option');optVide.value='';optVide.textContent='— Choisir —';sel.appendChild(optVide);
  packCours.patterns.filter(p=>p.encyclo_ref&&ENCYCLO[p.encyclo_ref]).forEach(p=>{
    const o=document.createElement('option');o.value=p.encyclo_ref;o.textContent=p.nom;sel.appendChild(o);
  });
  if(currentEncycloId)sel.value=currentEncycloId;
  sel.addEventListener('change',()=>{
    if(sel.value){
      showEncycloEntry(sel.value);
      if(!encycloOuvert)toggleEncyclo(true);
    }
  });
  sel.addEventListener('pointerdown',e=>e.stopPropagation());
  bar.appendChild(sel);

  const saveBtnEnc=document.createElement('button');
  saveBtnEnc.id='save-btn-encyclo';saveBtnEnc.className='btn-sec-save';saveBtnEnc.textContent='💾';
  saveBtnEnc.addEventListener('click',()=>{saveToStorage();encycloDir=false;updateEncycloSaveBtn();flashSave(saveBtnEnc);});
  bar.appendChild(saveBtnEnc);
  bar.appendChild(mkBtnMenu());

  const btnVolet=document.createElement('button');
  btnVolet.className='btn-volet'+(encycloOuvert?' open':'');
  btnVolet.textContent=encycloOuvert?'Lire ▼':'Lire ▶';
  btnVolet.addEventListener('click',e=>{e.stopPropagation();toggleEncyclo(!encycloOuvert);btnVolet.textContent=encycloOuvert?'Lire ▼':'Lire ▶';btnVolet.classList.toggle('open',encycloOuvert);});
  bar.appendChild(btnVolet);

  bar.addEventListener('click',e=>{
    if(e.target===bar||e.target===lbl){
      toggleEncyclo(!encycloOuvert);
      btnVolet.textContent=encycloOuvert?'Lire ▼':'Lire ▶';
      btnVolet.classList.toggle('open',encycloOuvert);
    }
  });
  cont.appendChild(bar);

  // Contenu collapsible
  const content=document.createElement('div');
  content.className='encyclo-content'+(encycloOuvert?' open':'');
  content.id='encyclo-content';
  const wrap=document.createElement('div');wrap.className='encyclo-wrap';
  const body=document.createElement('div');body.id='encyclo-body';
  wrap.appendChild(body);content.appendChild(wrap);
  cont.appendChild(content);

  if(currentEncycloId)renderEncyclo(currentEncycloId);
}

function toggleEncyclo(open){
  encycloOuvert=open;
  const content=document.getElementById('encyclo-content');
  if(content)content.classList.toggle('open',open);
}

function showEncycloEntry(key){
  currentEncycloId=key;
  const sel=document.getElementById('encyclo-select');
  if(sel&&[...sel.options].some(o=>o.value===key))sel.value=key;
  renderEncyclo(key);
}

function renderEncyclo(key){
  const body=document.getElementById('encyclo-body');if(!body)return;
  body.innerHTML='';
  const enc=packCours.encyclo||ENCYCLO;
  const entry=enc[key];
  if(!entry){
    const p=document.createElement('p');p.className='encyclo-vide';p.textContent='Aucune entrée disponible.';
    body.appendChild(p);return;
  }
  const isTX=currentMode==='tx';
  const ensureEnc=()=>{if(!packCours.encyclo)packCours.encyclo=JSON.parse(JSON.stringify(ENCYCLO));};

  const chapo=document.createElement('p');chapo.className='encyclo-chapo';chapo.textContent=entry.chapo;
  if(isTX){
    chapo.contentEditable='true';
    chapo.addEventListener('blur',()=>{ensureEnc();packCours.encyclo[key].chapo=chapo.textContent;encycloDir=true;updateEncycloSaveBtn();});
  }
  body.appendChild(chapo);

  const ul=document.createElement('ul');ul.className='encyclo-bullets';
  entry.bullets.forEach(([bk,bv],i)=>{
    const li=document.createElement('li');
    const k=document.createElement('span');k.className='encyclo-bkey';k.textContent=bk;
    const v=document.createElement('span');v.className='encyclo-bval';v.textContent=bv;
    if(isTX){
      k.contentEditable='true';
      k.addEventListener('blur',()=>{ensureEnc();packCours.encyclo[key].bullets[i][0]=k.textContent;encycloDir=true;updateEncycloSaveBtn();});
      v.contentEditable='true';
      v.addEventListener('blur',()=>{ensureEnc();packCours.encyclo[key].bullets[i][1]=v.textContent;encycloDir=true;updateEncycloSaveBtn();});
    }
    li.appendChild(k);li.appendChild(v);ul.appendChild(li);
  });
  body.appendChild(ul);
}

  const b=document.createElement('button');

function mkBtnMenu(onClick){

// ── Mises à jour partielles (sans rebuild complet) ─────────────────────────
function updateGrooveSelect(){
  const sel=document.getElementById('groove-select');
  if(sel&&currentGrooveId)sel.value=currentGrooveId;
}

function updateGlobalSpeedBtns(){
  const bh=document.getElementById('btn-global-half');
  const bd=document.getElementById('btn-global-double');
  if(bh)bh.classList.toggle('active',globalSpeedMult===0.5);
  if(bd)bd.classList.toggle('active',globalSpeedMult===2);
}

function updateSpmDisplay(){
  const spm=parseInt(document.getElementById('bpm').value)*globalSpeedMult;
  const half=Math.round(spm/2),third=Math.round(spm/3),quarter=Math.round(spm/4);
  const eq=document.getElementById('bpm-equiv');
  if(eq)eq.innerHTML='<span style="letter-spacing:-.1em">♩♩</span>='+quarter+'&ensp;♩='+half+'&ensp;♩.='+third;
}

let dialogCallback=null;

function setMode(mode){
  currentMode=mode;
  document.body.classList.toggle('mode-tx',mode==='tx');
  document.getElementById('btn-sx-tx').textContent=mode.toUpperCase();
  buildLayers();
  // Rebuild l'encyclo pour ajouter/retirer contenteditable selon le mode
  if(currentEncycloId)renderEncyclo(currentEncycloId);
}

function saveToStorage(){
  try{localStorage.setItem('ptk_content_v2',JSON.stringify(packCours));}catch(e){}
}

function exportJSON(){
  const titre=packCours.meta.titre||'poumtchak_cours';
  const blob=new Blob([JSON.stringify(packCours,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=titre.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showPatternShareDialog(patNom,grooveNames,cb){
  dialogCallback=cb;
  document.getElementById('ptk-dlg-msg').innerHTML=
    'Le pattern <strong>'+patNom+'</strong> est utilisé dans '+grooveNames.length+
    ' groove'+(grooveNames.length>1?'s':'')+' :<br>'+
    grooveNames.map(n=>'&bull; '+n).join('<br>')+
    '<br><br>Que voulez-vous faire ?';
  document.getElementById('ptk-dialog').classList.remove('hidden');
}

function createUserPattern(seq,sourcePat){
  const id='user_'+Date.now();
  const newPat={
    id,
    nom:(sourcePat?sourcePat.nom:'Pattern')+' (modifié)',
    sequence:seq.join(''),
    pas:seq.length,
    unite_temps:sourcePat?sourcePat.unite_temps:'1/8',
    pas_par_mesure:sourcePat?sourcePat.pas_par_mesure:8,
    source:'user',
  };
  packCours.patterns.push(newPat);
  let grp=packCours.groupes_patterns.find(g=>g.id==='user');
  if(!grp){grp={id:'user',label:'Mes patterns',ids:[]};packCours.groupes_patterns.push(grp);}
  grp.ids.push(id);
  return newPat;
}
