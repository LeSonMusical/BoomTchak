// ═══════════════════════════════════════════════════════════════════════════
// MODULE CIRCLE — Vue circulaire (canvas)
// ═══════════════════════════════════════════════════════════════════════════

let circleView = false;
const flashStep = [-1,-1,-1];

const CIRCLE_COLORS = [
  {fill:'#378ADD', stroke:'#185FA5', track:'rgba(55,138,221,0.25)'},   // grave — cercle intérieur
  {fill:'#D85A30', stroke:'#993C1D', track:'rgba(216,90,48,0.25)'},    // aigu  — cercle médian
  {fill:'#1D9E75', stroke:'#0F6E56', track:'rgba(29,158,117,0.25)'},   // noise — cercle extérieur
];

function stepAngle(si, total){
  return -Math.PI/2 + (2*Math.PI*si/total);
}

function resizeCanvas(){
  const cv = document.getElementById('rhythm-canvas'); if(!cv) return;
  const wrap = document.getElementById('circle-view');
  const frame = wrap.closest('.frame');
  const dotR = 10;
  const r0 = 16*dotR/Math.PI;    // rayon cercle intérieur (~50.9px)
  const r2 = r0 + dotR*4;        // rayon cercle extérieur
  const szNatural = Math.round(2*(r2+dotR+6));   // taille naturelle du canvas

  // Sur desktop (≥600px) : le canvas partage la ligne avec les controls
  // → on lui alloue ~45% de la largeur du frame (max szNatural)
  const frameW = frame ? frame.clientWidth : window.innerWidth;
  const isDesktop = window.innerWidth >= 600;
  const maxW = isDesktop ? Math.min(szNatural, Math.floor(frameW*0.46)) : frameW - 16;
  const scale = Math.min(1, maxW / szNatural);

  cv.width = szNatural; cv.height = szNatural;
  cv.style.transform = scale < 1 ? 'scale('+scale+')' : '';
  const physSz = Math.round(szNatural * scale);
  if(isDesktop){
    cv.style.transformOrigin = 'top left';
    wrap.style.width  = physSz + 'px';
  } else {
    cv.style.transformOrigin = 'top center';
    wrap.style.width  = '100%';
  }
  wrap.style.height = physSz + 'px';
  drawCircles();
}

function drawCircles(){
  const cv = document.getElementById('rhythm-canvas'); if(!cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height, cx = W/2, cy = H/2;
  const dotR = 10;
  const r0 = 16*dotR/Math.PI;
  const radii = [r0, r0+dotR*2, r0+dotR*4];

  ctx.clearRect(0, 0, W, H);

  const now = playing ? getAC().currentTime : 0;

  // Calcul fraction needle par layer
  const fracs = LAYERS.map((_,li)=>{
    if(!playing) return 0;
    const bs = getBeatSec(li), el = now - state[li].startTime;
    const cyc = bs * state[li].pattern.length;
    return ((el % cyc) + cyc) % cyc / cyc;
  });

  // Dessin extérieur → intérieur (outer on top visuellement)
  [2,1,0].forEach(li=>{
    const pat = state[li].pattern;
    const n = pat.length;
    const r = radii[li];
    const col = CIRCLE_COLORS[li];
    const isMuted = state[li].muted;

    // Anneau de piste
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
    ctx.strokeStyle = col.track; ctx.lineWidth = 1.5; ctx.stroke();

    // Step courant (pour flash)
    let curSi = -1;
    if(playing){
      const bs = getBeatSec(li), el = now - state[li].startTime;
      curSi = Math.floor(el/bs) % n;
      if(curSi !== flashStep[li]) flashStep[li] = curSi;
    }

    // Points
    for(let si=0; si<n; si++){
      const a = stepAngle(si, n);
      const dx = cx + r*Math.cos(a), dy = cy + r*Math.sin(a);
      const isOn   = pat[si]==='X';
      const isSoft = pat[si]==='x';
      const isPlaying = playing && si===flashStep[li];

      // Dessin du point selon l'état (X grand plein, x petit atténué, . petit vide)
      if(isOn){
        ctx.beginPath(); ctx.arc(dx, dy, dotR, 0, 2*Math.PI);
        ctx.fillStyle = isMuted ? col.fill+'55' : col.fill; ctx.fill();
        ctx.strokeStyle = isMuted ? col.stroke+'55' : col.stroke; ctx.lineWidth=1; ctx.stroke();
      } else if(isSoft){
        // x faible : taille intermédiaire entre . (×0.6) et X (×1), ~33% opacité
        ctx.beginPath(); ctx.arc(dx, dy, dotR*0.82, 0, 2*Math.PI);
        ctx.fillStyle = isMuted ? col.fill+'22' : col.fill+'55'; ctx.fill();
        ctx.strokeStyle = isMuted ? col.stroke+'22' : col.stroke+'55'; ctx.lineWidth=0.75; ctx.stroke();
      } else {
        // Silence : petit cercle vide
        ctx.beginPath(); ctx.arc(dx, dy, dotR*0.6, 0, 2*Math.PI);
        ctx.fillStyle='#f0ede8'; ctx.fill();
        ctx.strokeStyle='#c8c5c0'; ctx.lineWidth=0.75; ctx.stroke();
      }

      // Anneau "grossi" sur le step en cours de lecture (remplace le flash jaune)
      if(isPlaying && (isOn || isSoft) && !isMuted){
        const dotSz = isOn ? dotR : dotR*0.82;
        ctx.beginPath(); ctx.arc(dx, dy, dotSz + 3.5, 0, 2*Math.PI);
        ctx.strokeStyle = col.stroke; ctx.lineWidth=1.5; ctx.stroke();
      }
    }
  });

  // Aiguilles — dégradé transparent au centre, opaque à leur cercle
  LAYERS.forEach((_, li)=>{
    const r = radii[li];
    const col = CIRCLE_COLORS[li];
    const ang = -Math.PI/2 + fracs[li]*2*Math.PI;
    const ex = cx + r*Math.cos(ang), ey = cy + r*Math.sin(ang);

    const grad = ctx.createLinearGradient(cx, cy, ex, ey);
    grad.addColorStop(0,   col.stroke+'00');   // transparent au pivot
    grad.addColorStop(0.5, col.stroke+'44');   // semi au milieu
    grad.addColorStop(1,   col.stroke+'cc');   // opaque à la tête

    ctx.save();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey);
    ctx.strokeStyle = grad; ctx.lineWidth = 2;
    ctx.lineCap = 'round'; ctx.stroke();
    ctx.restore();
  });

  // Pivot central
  ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, 2*Math.PI);
  ctx.fillStyle='#1a1a18'; ctx.fill();
}

function circleHitTest(x, y){
  const cv = document.getElementById('rhythm-canvas'); if(!cv) return null;
  const dotR = 10, r0 = 16*dotR/Math.PI;
  const radii = [r0, r0+dotR*2, r0+dotR*4];
  const cx = cv.width/2, cy = cv.height/2;
  for(let li=0; li<LAYERS.length; li++){
    const n = state[li].pattern.length, r = radii[li];
    for(let si=0; si<n; si++){
      const a = stepAngle(si, n);
      const dx = cx+r*Math.cos(a), dy = cy+r*Math.sin(a);
      if(Math.hypot(x-dx, y-dy) <= dotR+4) return {li, si};
    }
  }
  return null;
}

function setupCanvasInteraction(){
  const cv = document.getElementById('rhythm-canvas'); if(!cv) return;
  function onPt(ex, ey){
    if(currentMode!=='tx') return;
    const rect = cv.getBoundingClientRect();
    const scaleX = cv.width/rect.width, scaleY = cv.height/rect.height;
    const hit = circleHitTest((ex-rect.left)*scaleX, (ey-rect.top)*scaleY);
    if(!hit) return;
    const {li, si} = hit;
    const srcPat = state[li].patternId ? getPattern(state[li].patternId) : null;
    const STEP_CYCLE={'.':'X','X':'x','x':'.'};
    const newVal=STEP_CYCLE[state[li].pattern[si]]??'.';
    state[li].pattern[si]=newVal;
    const isDirty = srcPat ? state[li].pattern.join('')!==srcPat.sequence : false;
    setLayerDirty(li, isDirty);
    drawCircles();
  }
  cv.addEventListener('click', e=>onPt(e.clientX, e.clientY));
  cv.addEventListener('touchend', e=>{
    e.preventDefault();
    const t = e.changedTouches[0]; onPt(t.clientX, t.clientY);
  }, {passive:false});
}

function setView(circle){
  circleView = circle;
  document.body.classList.toggle('view-circle', circle);
  document.getElementById('btn-view').textContent = circle ? '⊞' : '◎';
  document.getElementById('btn-view').title = circle ? 'Vue linéaire' : 'Vue circulaire';

  cancelAnimationFrame(visualRafID);
  visualRafID = null;

  // Sync visibilité cercle et layers-wrap selon layersOuverts
  const cv=document.getElementById('circle-view');
  const lw=document.getElementById('layers-wrap');
  if(cv)cv.style.display=(circle&&layersOuverts)?'flex':'none';
  if(lw)lw.style.display=layersOuverts?'':'none';

  if(circle){
    flashStep[0]=flashStep[1]=flashStep[2]=-1;
    setTimeout(()=>{ resizeCanvas(); setupCanvasInteraction(); }, 30);
    if(playing) visualRafID = requestAnimationFrame(visualLoopCircle);
  } else {
    LAYERS.forEach((_,li)=>{ buildStepsDOM(li,false); setTimeout(()=>checkWrap(li),0); });
    if(playing) visualRafID = requestAnimationFrame(visualLoop);
  }
}

function visualLoopCircle(){
  if(!playing) return;
  drawCircles();
  visualRafID = requestAnimationFrame(visualLoopCircle);
}

// ── État drag bibliothèque ────────────────────────────────────────────────
let _libDragSrcId = null;

// ── Liste des patterns ────────────────────────────────────────────────────
function buildLibListPatterns(){
  const list = document.getElementById('lib-list-patterns');
  list.innerHTML = '';
  document.getElementById('lib-select-all-patterns').checked = false;
  document.getElementById('lib-batch-del-patterns').disabled = true;

  // Filtre famille courant (sélect en tête du panel)
  const filtreEl = document.getElementById('lib-fam-filter-patterns');
  const filtreId = filtreEl ? filtreEl.value : 'all';
  const patterns = filtreId && filtreId !== 'all'
    ? packCours.patterns.filter(p=>(p.familles||[]).includes(filtreId))
    : packCours.patterns;

  patterns.forEach(pat=>{
    const item = document.createElement('div');
    item.className = 'lib-item';
    item.dataset.patId = pat.id;
    item.setAttribute('draggable', 'true');

    // Checkbox sélection batch
    const chk = document.createElement('input');
    chk.type = 'checkbox'; chk.className = 'lib-item-check';
    chk.addEventListener('change', updateLibBatchBar);
    item.appendChild(chk);

    // Poignée de drag ⠿
    const handle = document.createElement('span');
    handle.className = 'lib-drag-handle';
    handle.textContent = '⠿';
    handle.title = 'Glisser pour réordonner';
    item.appendChild(handle);

    // Nom (cliquable → rename inline)
    const nameEl = document.createElement('span');
    nameEl.className = 'lib-item-name';
    nameEl.textContent = pat.nom.replace(/^● modifié /,'');
    nameEl.title = 'Cliquer pour renommer';
    nameEl.addEventListener('click', ()=>libStartRenamePattern(nameEl, pat.id));
    item.appendChild(nameEl);

    // Tags famille
    const tagsWrap = document.createElement('div'); tagsWrap.className = 'lib-item-tags';
    libBuildPatternTags(tagsWrap, pat);
    item.appendChild(tagsWrap);

    // Badge source
    if(pat.source === 'default'){
      const badge = document.createElement('span'); badge.className = 'lib-source-badge';
      badge.textContent = 'défaut'; item.appendChild(badge);
    }

    // Bouton supprimer 🗑
    const delBtn = document.createElement('button'); delBtn.className = 'lib-item-del';
    delBtn.textContent = '🗑'; delBtn.title = 'Supprimer ce pattern';
    delBtn.addEventListener('click', ()=>{
      if(!confirm('Supprimer le pattern « '+pat.nom+' » ?')) return;
      libDeletePattern(pat.id);
    });
    item.appendChild(delBtn);

    // ── Drag HTML5 (souris) ───────────────────────────────────────────────
    item.addEventListener('dragstart', e=>{
      _libDragSrcId = pat.id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(()=>item.classList.add('lib-item-dragging'), 0);
    });
    item.addEventListener('dragend', ()=>{
      item.classList.remove('lib-item-dragging');
      list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over'));
      _libDragSrcId = null;
    });
    item.addEventListener('dragover', e=>{
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over'));
      if(pat.id !== _libDragSrcId) item.classList.add('lib-item-drag-over');
    });
    item.addEventListener('drop', e=>{
      e.preventDefault();
      if(_libDragSrcId && _libDragSrcId !== pat.id) libDropPattern(_libDragSrcId, pat.id);
    });

    // ── Drag Touch (mobile) ───────────────────────────────────────────────
    handle.addEventListener('touchstart', e=>{
      e.preventDefault();
      _libDragSrcId = pat.id;
      item.classList.add('lib-item-dragging');
    }, {passive:false});
    handle.addEventListener('touchmove', e=>{
      e.preventDefault();
      if(!_libDragSrcId) return;
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest('.lib-item') : null;
      list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over'));
      if(target && target.dataset.patId !== _libDragSrcId) target.classList.add('lib-item-drag-over');
    }, {passive:false});
    handle.addEventListener('touchend', e=>{
      e.preventDefault();
      const over = list.querySelector('.lib-item-drag-over');
      item.classList.remove('lib-item-dragging');
      list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over'));
      if(over && _libDragSrcId && over.dataset.patId !== _libDragSrcId){
        libDropPattern(_libDragSrcId, over.dataset.patId);
      }
      _libDragSrcId = null;
    }, {passive:false});

    list.appendChild(item);
  });
}

function libBuildPatternTags(container, pat){
  container.innerHTML = '';
  (pat.familles||[]).forEach(fid=>{
    const fam = getFamille(fid); if(!fam) return;
    const chip = document.createElement('span'); chip.className = 'fam-tag';
    chip.textContent = fam.nom;
    const x = document.createElement('button'); x.className = 'fam-tag-x'; x.textContent = '×';
    x.title = 'Retirer cette famille';
    x.addEventListener('click', e=>{ e.stopPropagation();
      pat.familles = (pat.familles||[]).filter(id=>id!==fid);
      libBuildPatternTags(container, pat);
      saveToStorage();
    });
    chip.appendChild(x); container.appendChild(chip);
  });
  // Bouton ajouter famille
  const addBtn = document.createElement('span'); addBtn.className = 'fam-tag-add';
  addBtn.textContent = '＋';
  // Construire un select inline au clic
  addBtn.addEventListener('click', e=>{
    e.stopPropagation();
    const available = packCours.familles.filter(f=>!(pat.familles||[]).includes(f.id));
    if(!available.length) return;
    const sel = document.createElement('select');
    sel.className = 'psp-fam-sel'; sel.style.cssText='font-size:9px;max-width:100px';
    sel.innerHTML = '<option value="">— Famille —</option>';
    available.forEach(f=>{
      const o=document.createElement('option');o.value=f.id;o.textContent=f.nom;sel.appendChild(o);
    });
    sel.addEventListener('change', ()=>{
      if(!sel.value) return;
      if(!pat.familles) pat.familles = [];
      pat.familles.push(sel.value);
      libBuildPatternTags(container, pat);
      saveToStorage();
    });
    sel.addEventListener('blur', ()=>{ if(sel.parentNode)sel.parentNode.removeChild(sel); });
    addBtn.parentNode.insertBefore(sel, addBtn);
    sel.focus();
  });

function libStartRenamePattern(nameEl, patId){
  nameEl.contentEditable = 'true';
  nameEl.focus();
  // Sélectionner tout le texte
  const range = document.createRange(); range.selectNodeContents(nameEl);
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  nameEl.dataset.orig = nameEl.textContent;
  const commit = ()=>{
    nameEl.contentEditable = 'false';
    const newNom = nameEl.textContent.trim();
    if(!newNom){ nameEl.textContent = nameEl.dataset.orig; return; }
    const pat = packCours.patterns.find(p=>p.id===patId);
    if(pat && newNom !== nameEl.dataset.orig){
      pat.nom = newNom;
      saveToStorage();
      // Mettre à jour les selects ouverts
      LAYERS.forEach((_,li)=>{
        const s = document.getElementById('sel-'+LAYERS[li].id);
        if(s) [...s.options].forEach(o=>{ if(o.value===patId) o.textContent=newNom; });
      });
    }
  };
  nameEl.addEventListener('blur', commit, {once:true});
  nameEl.addEventListener('keydown', e=>{
    if(e.key==='Enter'){e.preventDefault();nameEl.blur();}
    if(e.key==='Escape'){nameEl.textContent=nameEl.dataset.orig;nameEl.blur();}
  });
}

// Dépose srcId devant tgtId dans le tableau global (drag-and-drop)
function libDropPattern(srcId, tgtId){
  const arr = packCours.patterns;
  const srcIdx = arr.findIndex(p=>p.id===srcId);
  const tgtIdx = arr.findIndex(p=>p.id===tgtId);
  if(srcIdx < 0 || tgtIdx < 0 || srcIdx === tgtIdx) return;
  const [moved] = arr.splice(srcIdx, 1);
  // Recalculer tgtIdx après le splice
  const newTgt = arr.findIndex(p=>p.id===tgtId);
  arr.splice(newTgt, 0, moved);
  saveToStorage();
  buildLibListPatterns();
  LAYERS.forEach((_,li)=>{
    const s = document.getElementById('sel-'+LAYERS[li].id);
    if(s){ const prev=s.value; buildPatternSelect(s,'all'); s.value=prev; }
  });
}

function libDeletePattern(patId){
  // Vérifier si utilisé dans un groove courant
  const usedIn = packCours.grooves.filter(g=>g.layers.some(l=>l.patternId===patId));
  if(usedIn.length){
    alert('Ce pattern est utilisé dans : '+usedIn.map(g=>g.nom).join(', ')+'\nRetirez-le d\'abord des grooves.');
    return;
  }
  packCours.patterns = packCours.patterns.filter(p=>p.id!==patId);
  saveToStorage();
  buildLibListPatterns();
  LAYERS.forEach((_,li)=>{
    const s = document.getElementById('sel-'+LAYERS[li].id);
    if(s){ buildPatternSelect(s,'all'); }
  });
}

function libDeleteFamille(famId, count){
  if(count > 0){
    const pats = packCours.patterns.filter(p=>(p.familles||[]).includes(famId)).map(p=>p.nom);
    const grvs = packCours.grooves.filter(g=>(g.familles||[]).includes(famId)).map(g=>g.nom);
    const all = [...pats.map(n=>'P: '+n), ...grvs.map(n=>'G: '+n)];
    const ok = confirm('Cette famille est utilisée par '+count+' élément'+(count!==1?'s':'')+':\n'+all.join(', ')+'\n\nLa supprimer quand même ?');
    if(!ok) return;
    packCours.patterns.forEach(p=>{ p.familles=(p.familles||[]).filter(id=>id!==famId); });
    packCours.grooves.forEach(g=>{ g.familles=(g.familles||[]).filter(id=>id!==famId); });
  }
  packCours.familles = packCours.familles.filter(f=>f.id!==famId);
  saveToStorage();
  rebuildAllFamFilters();
  buildLibFamListPatterns();
  buildLibListPatterns();
  // Rafraîchir aussi le panel grooves s'il est ouvert
  if(!document.getElementById('lib-panel-grooves').classList.contains('hidden')){
    buildLibFamListGrooves(); buildLibListGrooves();
  }
}

// ── Events panel ≡ (attachés une seule fois dans attachEvents) ────────────

  // Supprimer la sélection
  document.getElementById('lib-batch-del-patterns').addEventListener('click', ()=>{
    const toDelete = [...document.querySelectorAll('#lib-list-patterns .lib-item-check:checked')]
      .map(c=>c.closest('.lib-item').dataset.patId);
    const blocked = toDelete.filter(id=>packCours.grooves.some(g=>g.layers.some(l=>l.patternId===id)));
    if(blocked.length){
      const noms = blocked.map(id=>{ const p=packCours.patterns.find(p=>p.id===id); return p?p.nom:id; });
      alert('Ces patterns sont utilisés dans des grooves et ne peuvent pas être supprimés :\n'+noms.join(', '));
      return;
    }
    if(!confirm('Supprimer '+toDelete.length+' pattern'+(toDelete.length!==1?'s':'')+' ?')) return;
    toDelete.forEach(id=>{ packCours.patterns=packCours.patterns.filter(p=>p.id!==id); });
    saveToStorage();
    buildLibListPatterns();
    LAYERS.forEach((_,li)=>{
      const s=document.getElementById('sel-'+LAYERS[li].id);

  document.getElementById('lib-fam-add-btn').addEventListener('click', ()=>{

function buildLibListGrooves(){
  const list = document.getElementById('lib-list-grooves'); list.innerHTML='';
  document.getElementById('lib-select-all-grooves').checked = false;
  document.getElementById('lib-batch-del-grooves').disabled = true;

  const filtreEl = document.getElementById('lib-fam-filter-grooves');
  const filtreId = filtreEl ? filtreEl.value : 'all';
  const grooves = filtreId && filtreId !== 'all'
    ? packCours.grooves.filter(g=>(g.familles||[]).includes(filtreId))
    : packCours.grooves;

  grooves.forEach(groove=>{
    const item = document.createElement('div');
    item.className = 'lib-item'; item.dataset.grooveId = groove.id;
    item.setAttribute('draggable','true');

    const chk = document.createElement('input'); chk.type='checkbox'; chk.className='lib-item-check';
    chk.addEventListener('change', updateLibGrooveBatchBar);
    item.appendChild(chk);

    const handle = document.createElement('span'); handle.className='lib-drag-handle'; handle.textContent='⠿';
    handle.title='Glisser pour réordonner'; item.appendChild(handle);

    const nameEl = document.createElement('span'); nameEl.className='lib-item-name';
    nameEl.textContent = groove.nom.replace(/^● modifié /,''); nameEl.title='Cliquer pour renommer';
    nameEl.addEventListener('click', ()=>libStartRenameGroove(nameEl, groove.id));
    item.appendChild(nameEl);

    const tagsWrap = document.createElement('div'); tagsWrap.className='lib-item-tags';
    libBuildGrooveTags(tagsWrap, groove); item.appendChild(tagsWrap);

    if(groove.source==='default'||!groove.source){
      const badge=document.createElement('span');badge.className='lib-source-badge';badge.textContent='défaut';item.appendChild(badge);
    }

    const delBtn = document.createElement('button'); delBtn.className='lib-item-del'; delBtn.textContent='🗑';
    delBtn.addEventListener('click',()=>{
      if(!confirm('Supprimer le groove « '+groove.nom+' » ?')) return;
      libDeleteGroove(groove.id);
    });
    item.appendChild(delBtn);

    // Drag HTML5
    item.addEventListener('dragstart',e=>{ _libDragSrcId=groove.id; e.dataTransfer.effectAllowed='move'; setTimeout(()=>item.classList.add('lib-item-dragging'),0); });
    item.addEventListener('dragend',()=>{ item.classList.remove('lib-item-dragging'); list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over')); _libDragSrcId=null; });
    item.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over')); if(groove.id!==_libDragSrcId)item.classList.add('lib-item-drag-over'); });
    item.addEventListener('drop',e=>{ e.preventDefault(); if(_libDragSrcId&&_libDragSrcId!==groove.id)libDropGroove(_libDragSrcId,groove.id); });

    // Drag Touch
    handle.addEventListener('touchstart',e=>{ e.preventDefault(); _libDragSrcId=groove.id; item.classList.add('lib-item-dragging'); },{passive:false});
    handle.addEventListener('touchmove',e=>{ e.preventDefault(); if(!_libDragSrcId)return; const t=e.touches[0]; const el=document.elementFromPoint(t.clientX,t.clientY); const tgt=el?el.closest('.lib-item'):null; list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over')); if(tgt&&tgt.dataset.grooveId!==_libDragSrcId)tgt.classList.add('lib-item-drag-over'); },{passive:false});
    handle.addEventListener('touchend',e=>{ e.preventDefault(); const over=list.querySelector('.lib-item-drag-over'); item.classList.remove('lib-item-dragging'); list.querySelectorAll('.lib-item-drag-over').forEach(el=>el.classList.remove('lib-item-drag-over')); if(over&&_libDragSrcId&&over.dataset.grooveId!==_libDragSrcId)libDropGroove(_libDragSrcId,over.dataset.grooveId); _libDragSrcId=null; },{passive:false});

    list.appendChild(item);
  });
}

function libBuildGrooveTags(container, groove){
  container.innerHTML='';
  (groove.familles||[]).forEach(fid=>{
    const fam=getFamille(fid); if(!fam) return;
    const chip=document.createElement('span'); chip.className='fam-tag'; chip.textContent=fam.nom;
    const x=document.createElement('button'); x.className='fam-tag-x'; x.textContent='×';
    x.addEventListener('click',e=>{ e.stopPropagation(); groove.familles=(groove.familles||[]).filter(id=>id!==fid); libBuildGrooveTags(container,groove); saveToStorage(); });
    chip.appendChild(x); container.appendChild(chip);
  });
  const addBtn=document.createElement('span'); addBtn.className='fam-tag-add'; addBtn.textContent='＋';
  addBtn.addEventListener('click',e=>{ e.stopPropagation();
    const available=packCours.familles.filter(f=>!(groove.familles||[]).includes(f.id)); if(!available.length) return;
    const sel=document.createElement('select'); sel.className='psp-fam-sel'; sel.style.cssText='font-size:9px;max-width:100px';
    sel.innerHTML='<option value="">— Famille —</option>';
    available.forEach(f=>{ const o=document.createElement('option');o.value=f.id;o.textContent=f.nom;sel.appendChild(o); });
    sel.addEventListener('change',()=>{ if(!sel.value) return; if(!groove.familles)groove.familles=[]; groove.familles.push(sel.value); libBuildGrooveTags(container,groove); saveToStorage(); });
    sel.addEventListener('blur',()=>{ if(sel.parentNode)sel.parentNode.removeChild(sel); });
    addBtn.parentNode.insertBefore(sel,addBtn); sel.focus();
  });
  container.appendChild(addBtn);
}

function libDropGroove(srcId, tgtId){
  const arr=packCours.grooves;

  document.getElementById('lib-overlay-encyclo').classList.add('hidden');
  document.getElementById('lib-panel-encyclo').classList.add('hidden');
}

function buildLibListEncyclo(){
  const list=document.getElementById('lib-list-encyclo'); list.innerHTML='';

  // Filtre 1 : famille
  const famVal=(document.getElementById('lib-fam-filter-encyclo')?.value)||'all';
  // Filtre 2 : type G/P
  const showG=document.getElementById('lib-encyclo-filter-g')?.checked!==false;
  const showP=document.getElementById('lib-encyclo-filter-p')?.checked!==false;
  // Filtre 3 : contenu (all | filled | empty)
  const contentState=document.getElementById('lib-encyclo-content-filter')?.dataset.state||'all';

  function passContent(hasC){
    if(contentState==='filled') return hasC;
    if(contentState==='empty')  return !hasC;
    return true;
  }
  function passFam(familles){
    return famVal==='all'||(familles||[]).includes(famVal);
  }

  if(showG){
    packCours.grooves.forEach(g=>{
      if(!passFam(g.familles)) return;
      const hasC=hasEncycloContent(g.id);
      if(!passContent(hasC)) return;
      list.appendChild(buildEncycloLibItem(g.id, g.nom, 'G', hasC));
    });
  }
  if(showP){
    packCours.patterns.forEach(p=>{
      if(!passFam(p.familles)) return;
      const key=p.encyclo_ref||p.id;
      const hasC=hasEncycloContent(key);
      if(!passContent(hasC)) return;
      list.appendChild(buildEncycloLibItem(key, p.nom, 'P', hasC));
    });
  }
  updateEncycloBatchBar();
}

function buildEncycloLibItem(key, nom, typeBadge, hasContent){
  const item=document.createElement('div'); item.className='lib-item';
  item.dataset.encycloKey=key;

  const cb=document.createElement('input'); cb.type='checkbox'; cb.className='lib-item-check';
  cb.addEventListener('change', updateEncycloBatchBar);
  item.appendChild(cb);

  const badge=document.createElement('span'); badge.className='lib-source-badge';
  badge.textContent=typeBadge; badge.style.cssText='background:'+(typeBadge==='G'?'#faf3e0':'#f0f5ff')+';color:'+(typeBadge==='G'?'#8B6914':'#2d5f80');
  item.appendChild(badge);

  const nameEl=document.createElement('span'); nameEl.className='lib-item-name';
  nameEl.textContent=nom; nameEl.style.opacity=hasContent?'1':'.4';
  nameEl.title=hasContent?'Cliquer pour voir':'Entrée vide';
  nameEl.addEventListener('click',()=>{
    closeLibPanelEncyclo();
    showEncycloEntry(key);
    if(!encycloOuvert)toggleEncyclo(true);
  });
  item.appendChild(nameEl);

  const statusEl=document.createElement('span'); statusEl.style.cssText='font-size:9px;color:'+(hasContent?'#1D9E75':'#ccc');
  statusEl.textContent=hasContent?'● remplie':'○ vide';
  item.appendChild(statusEl);
  return item;
}

function updateEncycloBatchBar(){
  const checks=[...document.querySelectorAll('#lib-list-encyclo .lib-item-check')];
  const anyChecked=checks.some(c=>c.checked);
  const delBtn=document.getElementById('lib-batch-del-encyclo');
  if(delBtn) delBtn.disabled=!anyChecked;
  const selAll=document.getElementById('lib-select-all-encyclo');
  if(selAll){
    selAll.indeterminate=anyChecked&&!checks.every(c=>c.checked);
    selAll.checked=checks.length>0&&checks.every(c=>c.checked);
  }
}

function attachEncycloLibEvents(){
  const el=id=>document.getElementById(id);
  el('lib-overlay-encyclo')?.addEventListener('click',closeLibPanelEncyclo);
  el('lib-panel-encyclo-close')?.addEventListener('click',closeLibPanelEncyclo);
  el('lib-fam-filter-encyclo')?.addEventListener('change',buildLibListEncyclo);
  el('lib-encyclo-filter-g')?.addEventListener('change',buildLibListEncyclo);
  el('lib-encyclo-filter-p')?.addEventListener('change',buildLibListEncyclo);

  el('lib-encyclo-content-filter')?.addEventListener('click',e=>{
    const states=['all','filled','empty'];
    const labels=['Tous','Remplis','Vides'];
    const cur=states.indexOf(e.currentTarget.dataset.state);
    const next=(cur+1)%states.length;
    e.currentTarget.dataset.state=states[next];
    e.currentTarget.textContent=labels[next];
    buildLibListEncyclo();
  });

  el('lib-select-all-encyclo')?.addEventListener('change',e=>{
    document.querySelectorAll('#lib-list-encyclo .lib-item-check').forEach(c=>{c.checked=e.target.checked;});
    updateEncycloBatchBar();
  });

  // Supprimer la sélection (vider le contenu)
  el('lib-batch-del-encyclo')?.addEventListener('click',()=>{
    const toEmpty=[...document.querySelectorAll('#lib-list-encyclo .lib-item-check:checked')]
      .map(c=>c.closest('.lib-item').dataset.encycloKey);
    if(!toEmpty.length)return;
    if(!confirm('Vider '+toEmpty.length+' entrée'+(toEmpty.length>1?'s':'')+' ?'))return;
    toEmpty.forEach(key=>{ packCours.encyclo[key]={chapo:'',bullets:[]}; });
    saveToStorage();
    buildLibListEncyclo();
    buildEncycloSection();
    if(toEmpty.includes(currentEncycloId))renderEncyclo(currentEncycloId);
  });
}

function loadFromStorage(){
  try{
    const saved=localStorage.getItem('ptk_content_v2');
    if(saved){
      const data=JSON.parse(saved);
      packCours=Object.assign(JSON.parse(JSON.stringify(PTK_DEFAULT)),data);
    } else {
      packCours=JSON.parse(JSON.stringify(PTK_DEFAULT));
    }
  } catch(e){
    packCours=JSON.parse(JSON.stringify(PTK_DEFAULT));
  }
  // Initialiser packCours.encyclo si absent (copie éditable de ENCYCLO)
  if(!packCours.encyclo)packCours.encyclo=JSON.parse(JSON.stringify(ENCYCLO));
  // Garantir l'entrée meta "poumtchak" (intro app, non liée à un pattern/groove)
  if(ENCYCLO.poumtchak&&!packCours.encyclo.poumtchak)
    packCours.encyclo.poumtchak=JSON.parse(JSON.stringify(ENCYCLO.poumtchak));
  // Garantir entrées encyclo vides pour tous les grooves et patterns
  packCours.grooves.forEach(g=>{
    if(!g.familles) g.familles=[];
    if(!packCours.encyclo[g.id]) packCours.encyclo[g.id]={chapo:'',bullets:[]};
  });
  packCours.patterns.forEach(p=>{
    if(!packCours.encyclo[p.id]) packCours.encyclo[p.id]={chapo:'',bullets:[]};
  });

  // ── Migration v2.0.x → v2.1.0 : groupes_patterns → familles sur chaque pattern ──
  if(packCours.groupes_patterns && !packCours._migrated_21){
    // Reconstituer familles[] sur chaque pattern depuis les anciens groupes
    packCours.groupes_patterns.forEach(grp=>{
      (grp.ids||[]).forEach(pid=>{
        const pat=packCours.patterns.find(p=>p.id===pid);
        if(pat && !pat.familles) pat.familles = [];
      });
    });
    // S'assurer que familles[] existe sur tous les patterns
    packCours.patterns.forEach(p=>{ if(!p.familles) p.familles=[]; });
    // Supprimer l'ancienne clé
    delete packCours.groupes_patterns;
    packCours._migrated_21 = true;
    saveToStorage();
  } else {
    // Garantir familles[] sur tout pattern sans (données fraîches ou déjà migrées)
    packCours.patterns.forEach(p=>{ if(!p.familles) p.familles=[]; });
  }

  // Garantir packCours.familles existe (peut manquer dans vieilles données)
  if(!packCours.familles || !packCours.familles.length){
    packCours.familles = JSON.parse(JSON.stringify(PTK_DEFAULT.familles));
  }
}

  document.getElementById('bpm').addEventListener('input',function(){
    document.getElementById('bpm-val').textContent=parseInt(this.value)+' spm';
    updateSpmDisplay();
  });

  document.getElementById('btn-global-half').addEventListener('click',()=>{
    pendingGlobalMult=globalSpeedMult===0.5?1:0.5;
    if(!playing){globalSpeedMult=pendingGlobalMult;updateGlobalSpeedBtns();updateSpmDisplay();}
  });

  document.getElementById('btn-global-double').addEventListener('click',()=>{
    pendingGlobalMult=globalSpeedMult===2?1:2;
    if(!playing){globalSpeedMult=pendingGlobalMult;updateGlobalSpeedBtns();updateSpmDisplay();}
  });

  // ── Vue circulaire / linéaire ──
  document.getElementById('btn-view').addEventListener('click',()=>setView(!circleView));

  // ── Sons ──

  });

    e.preventDefault();
    if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}ac.resume();
    playConga(true);
    const btn=e.currentTarget;btn.classList.add('flash');btn.addEventListener('animationend',()=>btn.classList.remove('flash'),{once:true});
  });

  // ── Mode TX ──
  document.getElementById('btn-sx-tx').addEventListener('click',()=>{
    setMode(currentMode==='tx'?'sx':'tx');
  });
  document.addEventListener('keydown',e=>{
    if(e.code==='Tab'){e.preventDefault();setMode(currentMode==='tx'?'sx':'tx');}
  });

  // ── Save sheet groove ──
  document.getElementById('ss-close').addEventListener('click', closeSaveSheet);
  document.getElementById('ss-cancel').addEventListener('click', closeSaveSheet);
  document.getElementById('save-sheet').addEventListener('click', e=>{
    if(e.target===e.currentTarget) closeSaveSheet();
  });
  document.getElementById('ss-overwrite').addEventListener('click', ()=>{
    if(!document.getElementById('ss-overwrite').disabled) doOverwriteGroove();
  });
  document.getElementById('ss-new-toggle').addEventListener('click', ()=>{
    const panel = document.getElementById('ss-new-panel');
    const isOpen = panel.classList.toggle('open');
    document.getElementById('ss-new-toggle').textContent =
      isOpen ? '② Sauvegarder comme nouveau ▼' : '② Sauvegarder comme nouveau ▶';
  });
  document.getElementById('ss-confirm').addEventListener('click', doSaveNewGroove);

  // ── Popover save pattern ──
  document.getElementById('psp-overlay').addEventListener('click', closePatSavePop);
  document.getElementById('psp-cancel').addEventListener('click', closePatSavePop);
  document.getElementById('psp-btn-overwrite').addEventListener('click', ()=>{

  });
  document.getElementById('psp-new-toggle').addEventListener('click', ()=>{
    const form = document.getElementById('psp-new-form');

    document.getElementById('psp-new-toggle').textContent =
      nowHidden ? '＋ Sauvegarder comme nouveau ▶' : '＋ Sauvegarder comme nouveau ▼';
    // Pré-sélectionner le champ nom à l'ouverture
    if(!nowHidden){

  document.getElementById('psp-fam-sel').addEventListener('change', e=>{
    const fid = e.target.value; if(!fid) return;
    if(!_pspNewFamIds.includes(fid)) _pspNewFamIds.push(fid);
    buildPspFamTags(); buildPspFamSel();
    e.target.value = '';
  });
  document.getElementById('psp-fam-create').addEventListener('click', ()=>{
    const input = document.getElementById('psp-name-input');
    // Utiliser le champ nom comme source si on veut créer une famille ad-hoc
    // → ouvrir un prompt simple
    const nomFam = prompt('Nom de la nouvelle famille :');
    if(!nomFam || !nomFam.trim()) return;
    const newFam = {id:'fam_user_'+Date.now(), nom:nomFam.trim()};
    packCours.familles.push(newFam);
    saveToStorage();

    rebuildAllFamFilters();
  });

  // ── Dialog partage pattern ──

    if(dialogCallback)dialogCallback('new');
    dialogCallback=null;
  });
  document.getElementById('ptk-dlg-cancel').addEventListener('click',()=>{
    document.getElementById('ptk-dialog').classList.add('hidden');
    if(dialogCallback)dialogCallback('cancel');
    dialogCallback=null;
  });

  // ── Panel ≡ bibliothèque patterns ──
  attachLibPanelEvents();
  // ── Panel ≡ grooves + encyclopédie ──
  attachGrooveLibEvents();
  attachEncycloLibEvents();

  // ── Raccourci clavier ──
  document.addEventListener('keydown',e=>{
    if(e.code==='Space'&&e.target===document.body){e.preventDefault();togglePlay();}
  });
}

function start(){
  loadFromStorage();

  // Appliquer le mode initial (URL param ou défaut SX)
  if(currentMode==='tx'){
    document.body.classList.add('mode-tx');
    document.getElementById('btn-sx-tx').textContent='TX';
  }

  // Groove aléatoire au démarrage
  const grooves=packCours.grooves;
  const randomGroove=grooves[Math.floor(Math.random()*grooves.length)];
  currentGrooveId=randomGroove.id;

  // Initialiser le state audio depuis le groove
  LAYERS.forEach((layer,li)=>{
    const gl=randomGroove.layers[li];if(!gl)return;
    const pat=getPattern(gl.patternId);if(!pat)return;
    let seq=pat.sequence.split('');
    if(gl.shift)seq=rotate(seq,seq.length-gl.shift);
    state[li].pattern=seq;
    state[li].patternId=gl.patternId;
    state[li].muted=gl.mute||false;
    state[li].halfOn=gl.halfOn||false;
    state[li].doubleOn=gl.doubleOn||false;
  });
  applyBandStyle(randomGroove.band_defaut);
  globalSpeedMult=randomGroove.vitesse_mult||1;
  pendingGlobalMult=globalSpeedMult;

  // Construire le DOM
  render();

  // Sélectionner le groove courant dans l'encyclopédie
  updateEncycloSelect(currentGrooveId);

  // Mettre à jour l'affichage tempo
  document.getElementById('bpm-val').textContent='200 spm';
  updateSpmDisplay();
  updateGlobalSpeedBtns();
}

// Lancer l'application
start();
attachEvents();
